teacher: deepseek
domain: dotnet_aspnet
system_prompt: 'You are an expert .NET developer writing F#-first ASP.NET Core applications.

  Show ASP.NET Core patterns from the F# perspective -- use F# syntax, not C#.

  Follow these conventions:

  - Use F# functions and partial application for DI where possible

  - Show idiomatic F# interop with C#-designed ASP.NET Core APIs

  - Include necessary `open` statements

  - Target .NET 9 / ASP.NET Core 9

  - Write concise explanations (2-3 sentences max) before the code

  Be concise. Return only the code and a brief explanation.

  '
temperature: 0.6
max_tokens: 4096
prompts:
- id: dotnet_0001_exp_000
  instruction: 'Implement a Giraffe web API for a healthcare appointment system with endpoints to schedule, view, and cancel
    appointments.

    Use dependency injection to register: a singleton configuration service for clinic hours, a scoped repository for appointment
    data,

    and a transient validator for appointment conflicts. Show both IServiceCollection registration in Program.fs and how to
    inject

    these dependencies into route handlers using partial application.'
- id: dotnet_0001_exp_001
  instruction: 'Create a financial transaction processing service in F# using Giraffe with endpoints for deposits, withdrawals,
    and balance checks.

    Configure DI with: a singleton audit logger, a scoped transaction repository with database context, and a transient validator

    for transaction amounts. Demonstrate how to handle dependency injection in middleware for request logging and how to pass

    services to HttpHandlers using the bindServices computation expression pattern.'
- id: dotnet_0001_exp_002
  instruction: 'Build a social media post moderation API with Giraffe that flags inappropriate content. Register as DI services:
    a singleton

    content filter configuration, a scoped post repository, and a transient profanity checker. Show how to create a custom

    HttpHandler that injects multiple services and handles conditional routing based on moderation results.'
- id: dotnet_0001_exp_003
  instruction: 'Design an IoT device management system using Giraffe with endpoints to register devices, send commands, and
    retrieve telemetry.

    Use dependency injection for: a singleton device registry cache, a scoped command processor, and a transient telemetry
    validator.

    Implement error handling that logs failures using the injected logger service and returns appropriate HTTP status codes.'
- id: dotnet_0001_exp_004
  instruction: 'Refactor an existing C# ASP.NET Core controller to an idiomatic F# Giraffe application. The system manages
    inventory for an

    e-commerce store. Show how to convert the controller''s constructor injection to Giraffe''s partial application pattern,

    registering: a singleton inventory cache, a scoped product repository, and a transient stock level validator.'
- id: dotnet_0001_exp_005
  instruction: 'Implement a multi-tenant SaaS application with Giraffe where each tenant has isolated data. Configure DI with:
    a singleton

    tenant configuration service, a scoped tenant-aware repository (using context from HTTP headers), and a transient permission

    validator. Demonstrate how to create a middleware that resolves tenant context and injects it into downstream handlers.'
- id: dotnet_0001_exp_006
  instruction: 'Create a real-time notification service using Giraffe with SignalR integration. Register DI services: a singleton
    connection

    manager, a scoped notification repository, and a transient message formatter. Show how to inject services into both HTTP

    endpoints and SignalR hub methods using different patterns appropriate for each context.'
- id: dotnet_0001_exp_007
  instruction: 'Build a document processing pipeline with Giraffe endpoints for upload, conversion, and download. Configure
    DI with: a singleton

    file type configuration, a scoped document processor, and a transient format validator. Implement a custom HttpHandler
    that

    streams large files while using injected services for progress tracking and error reporting.'
- id: dotnet_0001_exp_008
  instruction: 'Design a microservices gateway in F# using Giraffe that routes requests to backend services. Use DI to register:
    a singleton

    routing configuration, a scoped service discovery client, and a transient request transformer. Show how to handle circuit

    breaker patterns with Polly integration and inject the policy registry into route handlers.'
- id: dotnet_0001_exp_009
  instruction: 'Implement a weather forecasting API with Giraffe that caches external API responses. Configure DI with: a
    singleton external

    API client (with retry logic), a scoped forecast repository with cache, and a transient location validator. Demonstrate

    response caching middleware that uses the injected cache service and handles cache invalidation.'
- id: dotnet_0001_exp_010
  instruction: 'Create a user authentication system with Giraffe supporting JWT tokens and OAuth2. Register DI services: a
    singleton token

    configuration, a scoped user repository, and a transient password hasher. Show how to create protected routes using

    authentication middleware that injects the token validation service and how to access user claims in handlers.'
- id: dotnet_0001_exp_011
  instruction: 'Build a workflow engine API with Giraffe for managing business processes. Configure DI with: a singleton workflow
    definition

    service, a scoped execution engine, and a transient step validator. Implement long-running operations using background

    services and show how to inject the job queue into HttpHandlers for status checking.'
- id: dotnet_0001_exp_012
  instruction: 'Design a RESTful API for a library management system using Giraffe with HATEOAS support. Register DI services:
    a singleton

    link generator, a scoped book repository, and a transient availability checker. Show how to create hypermedia responses

    where the injected link service dynamically generates navigation links based on resource state.'
- id: dotnet_0001_exp_013
  instruction: 'Implement a payment processing webhook handler with Giraffe that validates signatures and processes events.
    Configure DI with:

    a singleton webhook configuration, a scoped event processor, and a transient signature validator. Demonstrate how to handle

    different webhook providers with strategy pattern using injected service factories.'
- id: dotnet_0001_exp_014
  instruction: 'Create a configuration management API for a distributed system using Giraffe. Register DI services: a singleton
    configuration

    store, a scoped environment manager, and a transient configuration validator. Implement feature flags and show how to
    inject

    the configuration service into route handlers to make runtime decisions.'
- id: dotnet_0001_exp_015
  instruction: 'Build a data export service with Giraffe that generates CSV, Excel, and PDF reports. Configure DI with: a
    singleton export

    configuration, a scoped data fetcher, and a transient format renderer. Show how to use content negotiation to return different

    formats based on Accept header, with each format handler using injected rendering services.'
- id: dotnet_0001_exp_016
  instruction: 'Design a rate-limited API gateway with Giraffe that enforces usage quotas. Register DI services: a singleton
    rate limit

    configuration, a scoped usage tracker, and a transient quota calculator. Implement sliding window rate limiting using
    Redis

    and show how to inject the distributed cache into the rate limiting middleware.'
- id: dotnet_0001_exp_017
  instruction: 'Implement a file storage service with Giraffe supporting multiple storage backends (local, S3, Azure Blob).
    Configure DI with:

    a singleton storage provider configuration, a scoped file manager with strategy pattern, and a transient file validator.

    Show how to use factory pattern to create storage providers at runtime based on request parameters.'
- id: dotnet_0001_exp_018
  instruction: 'Create a machine learning model serving API with Giraffe for online predictions. Register DI services: a singleton
    model

    registry, a scoped prediction service, and a transient input validator. Implement request batching for performance and
    show

    how to inject the batching service while handling timeouts and partial failures.'
- id: dotnet_0001_exp_019
  instruction: 'Build a compliance auditing system for financial transactions using Giraffe. Configure DI with: a singleton
    compliance rules

    engine, a scoped audit logger, and a transient transaction analyzer. Demonstrate how to create an audit trail for all
    requests

    using middleware that injects the audit service and captures request/response data.'
- id: dotnet_0001_exp_020
  instruction: 'Design a content management API with Giraffe supporting versioning and drafts. Register DI services: a singleton
    content

    configuration, a scoped version repository, and a transient content validator. Implement ETag support for conditional
    requests

    and show how to inject the version comparison service into update handlers.'
- id: dotnet_0001_exp_021
  instruction: 'Implement a service health monitoring dashboard with Giraffe endpoints. Configure DI with: a singleton health
    check registry,

    a scoped status aggregator, and a transient health evaluator. Show how to create custom health checks as services and
    inject

    them into the health endpoint handler, supporting both detailed and summary views.'
- id: dotnet_0001_exp_022
  instruction: 'Create a messaging queue API with Giraffe for producing and consuming messages. Register DI services: a singleton
    queue

    configuration, a scoped message broker, and a transient message serializer. Implement idempotent message processing and
    show

    how to inject the idempotency service to prevent duplicate processing.'
- id: dotnet_0001_exp_023
  instruction: 'Build a geospatial API with Giraffe for location-based queries. Configure DI with: a singleton spatial index,
    a scoped

    location repository, and a transient coordinate validator. Implement proximity search with performance optimizations and
    show

    how to inject the spatial index into search handlers for efficient queries.'
- id: dotnet_0001_exp_024
  instruction: 'Design an A/B testing framework API with Giraffe for feature rollout. Register DI services: a singleton experiment
    configuration,

    a scoped variant assigner, and a transient metric collector. Show how to inject the experiment service into route handlers

    to conditionally enable features and track user interactions.'
- id: dotnet_0001_exp_025
  instruction: 'Implement a backup and restore API for database content using Giraffe. Configure DI with: a singleton backup
    configuration,

    a scoped backup executor, and a transient restore validator. Demonstrate streaming large backup files with progress tracking

    using injected progress reporting services.'
- id: dotnet_0001_exp_026
  instruction: 'Create a collaborative editing API with Giraffe using operational transformation. Register DI services: a
    singleton document

    registry, a scoped transformation engine, and a transient conflict resolver. Implement WebSocket endpoints for real-time

    collaboration and show how to inject services into connection handlers.'
- id: dotnet_0001_exp_027
  instruction: 'Build a search engine API with Giraffe for full-text search across documents. Configure DI with: a singleton
    search index,

    a scoped query processor, and a transient relevance scorer. Implement faceted search with pagination and show how to inject

    the scoring service to customize result ranking.'
- id: dotnet_0001_exp_028
  instruction: 'Design a workflow approval system with Giraffe for document review processes. Register DI services: a singleton
    approval

    policy configuration, a scoped workflow engine, and a transient permission checker. Implement role-based access control

    and show how to inject the permission service into authorization middleware.'
- id: dotnet_0001_exp_029
  instruction: 'Implement a data synchronization API with Giraffe for mobile app offline support. Configure DI with: a singleton
    sync

    configuration, a scoped change tracker, and a transient conflict detector. Demonstrate delta synchronization and show
    how

    to inject the conflict resolution service to handle merge conflicts.'
- id: dotnet_0002_exp_000
  instruction: 'Create an ASP.NET Core middleware in F# that implements request validation logging for a healthcare API. It
    should:

    1. Log validation failures with structured data including patient ID, validation rule, and request body hash

    2. Add a HIPAA-compliant transaction ID header (X-Transaction-Id) using GUIDs

    3. Return 400 Bad Request with detailed validation errors in JSON format when validation fails

    4. Use Serilog''s LogContext to push correlation properties through the request pipeline

    Implement both the convention-based approach and the factory-based middleware approach.'
- id: dotnet_0002_exp_001
  instruction: 'Design F# middleware for a financial trading platform that:

    1. Logs trade execution latency with percentiles and tags for different asset classes (stocks, forex, crypto)

    2. Adds a unique trade correlation ID that propagates through microservices

    3. Catches market data exceptions and returns appropriate HTTP status codes (429 for rate limits, 503 for data feed issues)

    4. Includes circuit breaker state in logs when trading operations fail

    Show how to configure Serilog with custom enrichers for financial context.'
- id: dotnet_0002_exp_002
  instruction: 'Implement IoT device middleware in F# that:

    1. Logs device telemetry ingestion with device ID, sensor type, and data quality metrics

    2. Adds a device session ID header that persists across reconnections

    3. Handles malformed telemetry data by returning structured error responses with schema validation details

    4. Uses Serilog''s filtering to suppress verbose logs from known problematic devices

    Demonstrate both inline middleware and class-based approaches with dependency injection.'
- id: dotnet_0002_exp_003
  instruction: 'Create social media API middleware in F# that:

    1. Logs user activity events with anonymized user IDs, content type, and engagement metrics

    2. Adds request context for A/B testing experiments via custom headers

    3. Catches content moderation violations and returns policy-violation-specific error codes

    4. Implements GDPR-compliant logging that excludes PII from certain endpoints

    Show how to use Serilog''s destructuring policies for sensitive data.'
- id: dotnet_0002_exp_004
  instruction: 'Build e-commerce checkout middleware in F# that:

    1. Logs cart operations with structured data including cart ID, item SKUs, and pricing calculations

    2. Adds distributed tracing headers compatible with OpenTelemetry

    3. Handles payment gateway timeouts with exponential backoff logging

    4. Returns user-friendly error messages while logging technical details internally

    Implement both simple lambda middleware and IMiddleware with scoped services.'
- id: dotnet_0002_exp_005
  instruction: 'Design inventory management middleware in F# that:

    1. Logs stock level changes with before/after quantities and warehouse location

    2. Adds operation batch ID for grouping related inventory updates

    3. Catches concurrency conflicts and returns conflict resolution details in JSON

    4. Uses Serilog''s conditional logging to only log slow operations (>500ms)

    Show how to integrate with ASP.NET Core''s health checks and log health status.'
- id: dotnet_0002_exp_006
  instruction: 'Implement real-time chat middleware in F# that:

    1. Logs message delivery metrics with room ID, message size, and delivery status

    2. Adds message sequence numbers for idempotent processing

    3. Handles WebSocket connection failures with reconnection guidance in error responses

    4. Uses Serilog''s async logging to avoid blocking real-time message processing

    Demonstrate middleware for both HTTP and WebSocket endpoints.'
- id: dotnet_0002_exp_007
  instruction: 'Create document processing pipeline middleware in F# that:

    1. Logs document transformation steps with file metadata, processing stage, and quality scores

    2. Adds job correlation ID that tracks documents through multiple processing services

    3. Catches OCR failures and returns machine-readable error codes for retry decisions

    4. Implements structured logging with custom log event properties for audit trails

    Show both traditional middleware and endpoint-specific middleware approaches.'
- id: dotnet_0002_exp_008
  instruction: 'Build gaming server middleware in F# that:

    1. Logs player actions with game session ID, action type, and latency percentiles

    2. Adds anti-cheat session tokens that validate request authenticity

    3. Handles cheat detection with graduated response (warnings, then bans) logged to security sink

    4. Uses Serilog''s level control to dynamically adjust logging verbosity based on server load

    Implement middleware that works with both REST and gRPC endpoints.'
- id: dotnet_0002_exp_009
  instruction: 'Design weather data API middleware in F# that:

    1. Logs forecast queries with location coordinates, data freshness, and cache hit/miss status

    2. Adds request fingerprinting for rate limiting by client characteristics

    3. Catches data source unavailability and returns graceful degradation responses

    4. Uses Serilog''s templating to format location data consistently across logs

    Show how to create middleware that can be conditionally applied based on route patterns.'
- id: dotnet_0002_exp_010
  instruction: 'Implement compliance audit middleware in F# that:

    1. Logs regulatory access patterns with user roles, accessed resources, and compliance flags

    2. Adds audit trail identifiers that link to external compliance systems

    3. Catches authorization failures and returns legally-required disclosure statements

    4. Uses Serilog''s buffered sinks to batch audit logs for performance

    Demonstrate middleware with configurable logging levels per compliance requirement.'
- id: dotnet_0002_exp_011
  instruction: 'Create content delivery network (CDN) middleware in F# that:

    1. Logs asset delivery metrics with file size, cache status, and geographic region

    2. Adds edge location headers for troubleshooting delivery paths

    3. Handles range requests and partial content delivery errors with byte-range-specific logging

    4. Uses Serilog''s dynamic log level switching based on traffic patterns

    Implement middleware that works with static files and API responses.'
- id: dotnet_0002_exp_012
  instruction: 'Build machine learning inference middleware in F# that:

    1. Logs model predictions with input features, confidence scores, and inference latency

    2. Adds experiment tracking IDs for A/B testing different model versions

    3. Catches tensor shape mismatches and returns model schema validation errors

    4. Uses Serilog''s context enrichment to add model version to all related logs

    Show how to implement middleware that can be composed with model-specific pre/post processors.'
- id: dotnet_0002_exp_013
  instruction: 'Design ride-sharing dispatch middleware in F# that:

    1. Logs ride requests with pickup/dropoff coordinates, pricing estimates, and matching algorithms used

    2. Adds trip correlation IDs that persist across microservice boundaries

    3. Handles surge pricing calculations and logs pricing decision factors

    4. Implements performance-sensitive logging that disables detailed logging during high load

    Demonstrate middleware with request/response body logging (with PII filtering).'
- id: dotnet_0002_exp_014
  instruction: 'Implement video streaming middleware in F# that:

    1. Logs streaming sessions with bitrate adaptations, buffer health, and quality switches

    2. Adds playback session IDs for correlating client-side and server-side logs

    3. Catches DRM license failures and returns device-specific troubleshooting codes

    4. Uses Serilog''s asynchronous logging to avoid blocking video packet processing

    Show middleware that handles both API requests and media stream requests.'
- id: dotnet_0002_exp_015
  instruction: 'Create airline booking middleware in F# that:

    1. Logs reservation attempts with flight numbers, passenger counts, and fare class availability

    2. Adds PNR (Passenger Name Record) identifiers for cross-system correlation

    3. Handles seat allocation conflicts with detailed conflict resolution logging

    4. Implements audit logging for compliance with aviation regulations

    Demonstrate middleware with custom Serilog enrichers for airline domain context.'
- id: dotnet_0002_exp_016
  instruction: 'Build cryptocurrency exchange middleware in F# that:

    1. Logs trading operations with wallet addresses, transaction hashes, and gas fees

    2. Adds blockchain transaction IDs for immutable audit trails

    3. Catches smart contract execution errors and returns revert reason decoding

    4. Uses Serilog''s file rolling with size limits for regulatory compliance logging

    Implement middleware that validates cryptographic signatures on requests.'
- id: dotnet_0002_exp_017
  instruction: 'Design telehealth consultation middleware in F# that:

    1. Logs consultation sessions with anonymized patient IDs, duration, and media quality metrics

    2. Adds HIPAA-compliant encounter IDs for medical record correlation

    3. Handles WebRTC connection failures with technical details for support teams

    4. Implements PII filtering in logs using Serilog''s destructuring transformers

    Show middleware that integrates with ASP.NET Core''s authentication and authorization.'
- id: dotnet_0002_exp_018
  instruction: 'Implement supply chain tracking middleware in F# that:

    1. Logs shipment events with RFID tags, location updates, and temperature readings

    2. Adds supply chain visibility tokens for partner system integration

    3. Catches IoT sensor data gaps and returns data completeness metrics

    4. Uses Serilog''s multiple sinks to send logs to both local files and cloud analytics

    Demonstrate middleware with configurable log sampling for high-volume tracking data.'
- id: dotnet_0002_exp_019
  instruction: 'Create online education platform middleware in F# that:

    1. Logs student interactions with course materials, quiz attempts, and engagement scores

    2. Adds learning path correlation IDs for tracking student progress

    3. Handles plagiarism detection alerts with detailed similarity scoring in logs

    4. Implements FERPA-compliant logging that excludes student identifying information

    Show how to use Serilog''s LogContext to add request-scoped educational context.'
- id: dotnet_0002_exp_020
  instruction: 'Build smart home automation middleware in F# that:

    1. Logs device commands with home ID, room, device type, and command success rates

    2. Adds home automation scene IDs for grouping related device operations

    3. Handles device offline scenarios with retry patterns and connectivity logging

    4. Uses Serilog''s conditional logging to reduce noise from frequent device pings

    Implement middleware that works with both synchronous HTTP and asynchronous message queues.'
- id: dotnet_0002_exp_021
  instruction: 'Design insurance claims processing middleware in F# that:

    1. Logs claim submissions with claim types, damage assessments, and fraud risk scores

    2. Adds claim adjustment IDs for tracking multiple revisions to claims

    3. Catches document validation errors and returns missing field indications

    4. Uses Serilog''s logging levels to separate operational logs from audit trails

    Demonstrate middleware that integrates with business workflow engine correlation.'
- id: dotnet_0002_exp_022
  instruction: 'Implement sports betting platform middleware in F# that:

    1. Logs bet placements with odds, stake amounts, and potential payout calculations

    2. Adds responsible gambling session tokens for player protection monitoring

    3. Handles odds change conflicts with versioning and conflict resolution logging

    4. Implements jurisdictional logging requirements with geo-specific log formats

    Show middleware with custom Serilog properties for gambling compliance reporting.'
- id: dotnet_0002_exp_023
  instruction: 'Create video conferencing middleware in F# that:

    1. Logs conference metrics with participant counts, network jitter, and video quality scores

    2. Adds meeting correlation IDs that persist across breakout rooms

    3. Handles recording failures with storage quota and permission error details

    4. Uses Serilog''s async logging to avoid blocking real-time media processing

    Implement middleware that works with both REST APIs and WebSocket connections.'
- id: dotnet_0002_exp_024
  instruction: 'Build agricultural IoT middleware in F# that:

    1. Logs sensor data from fields with GPS coordinates, sensor types, and calibration status

    2. Adds farm operation IDs for correlating equipment usage with sensor readings

    3. Handles satellite connectivity drops with offline buffering and sync logging

    4. Implements log rotation based on both size and time for field deployment constraints

    Demonstrate middleware with environmental condition-aware logging levels.'
- id: dotnet_0002_exp_025
  instruction: 'Design legal document review middleware in F# that:

    1. Logs document analysis with matter numbers, review stages, and confidentiality levels

    2. Adds legal hold identifiers for compliance with discovery requests

    3. Catches redaction failures and returns document section-specific errors

    4. Uses Serilog''s enrichers to add attorney-client privilege flags to logs

    Implement middleware with configurable retention policies for different case types.'
- id: dotnet_0002_exp_026
  instruction: 'Create fitness tracking middleware in F# that:

    1. Logs workout sessions with exercise types, duration, heart rate zones, and calorie estimates

    2. Adds fitness challenge IDs for group competition tracking

    3. Handles biometric sensor integration errors with device-specific troubleshooting

    4. Implements privacy-focused logging that excludes health data by default

    Show middleware that integrates with both mobile app APIs and wearable device sync.'
- id: dotnet_0002_exp_027
  instruction: 'Build event ticketing middleware in F# that:

    1. Logs ticket purchases with event IDs, seat selections, and pricing tiers

    2. Adds order correlation IDs for tracking from cart to fulfillment

    3. Handles concurrent seat selection conflicts with detailed conflict logging

    4. Uses Serilog''s logging to detect and alert on potential ticket fraud patterns

    Demonstrate middleware with surge pricing and availability caching considerations.'
- id: dotnet_0002_exp_028
  instruction: 'Implement podcast hosting middleware in F# that:

    1. Logs episode downloads with listener geography, client devices, and partial download tracking

    2. Adds content distribution IDs for tracking across CDN edges

    3. Handles RSS feed generation errors with validation details for content producers

    4. Uses Serilog''s structured logging to analyze listener engagement patterns

    Show middleware that handles both API requests and static media file delivery.'
- id: dotnet_0002_exp_029
  instruction: 'Design construction project management middleware in F# that:

    1. Logs site inspections with project phases, safety compliance checks, and photo upload metadata

    2. Adds work package IDs for correlating across subcontractor systems

    3. Handles blueprint version conflicts with revision history in error responses

    4. Implements offline-capable logging for remote construction sites with poor connectivity

    Demonstrate middleware with domain-specific Serilog enrichers for construction safety codes.'
- id: dotnet_0003_exp_000
  instruction: 'Implement a configuration system for a microservices-based e-commerce platform in F# using the Options pattern:

    1. Define options types for OrderServiceOptions (with retry count, timeout, batch size), InventoryOptions (with stock
    threshold, sync interval), and NotificationOptions (with email templates, webhook URLs)

    2. Bind these from multiple appsettings.{environment}.json files using ConfigurationBuilder

    3. Demonstrate IOptions<OrderServiceOptions> for singleton services, IOptionsSnapshot<InventoryOptions> for scoped services,
    and IOptionsMonitor<NotificationOptions> for notifications that need to change without restart

    4. Add custom validation ensuring batch size is between 1-100 and retry count is positive

    5. Show how to handle configuration changes during runtime with IOptionsMonitor.OnChange callbacks'
- id: dotnet_0003_exp_001
  instruction: 'Create a healthcare EHR system configuration module in F#:

    1. Define HIPAA-compliant options types for PatientDataOptions (encryption algorithm, retention days), AuditOptions (log
    level, retention path), and HL7Options (endpoint, timeout, retry policy)

    2. Bind from both appsettings.json and environment variables (prefixed with "EHR_")

    3. Use IOptionsSnapshot<AuditOptions> for request-scoped audit logging and IOptionsMonitor<HL7Options> for connection
    settings that can be updated without downtime

    4. Validate using DataAnnotations (e.g., [Range(1, 365)] for retention days) and custom validation ensuring encryption
    algorithm is from an approved list

    5. Handle configuration errors gracefully with fallback defaults'
- id: dotnet_0003_exp_002
  instruction: 'Design a real-time IoT device management configuration system in F#:

    1. Create options types for DeviceManagerOptions (max connections, heartbeat interval), TelemetryOptions (batch size,
    flush interval, compression level), and AlertOptions (thresholds, cooldown period)

    2. Bind configuration from appsettings.json, command-line arguments, and a remote configuration service (simulated with
    a JSON string)

    3. Demonstrate IOptions<DeviceManagerOptions> for singleton manager, IOptionsSnapshot<TelemetryOptions> per device session,
    and IOptionsMonitor<AlertOptions> for dynamic threshold adjustments

    4. Add validation ensuring heartbeat interval is between 5-60 seconds and compression level is valid

    5. Show how to unit test configuration binding and validation'
- id: dotnet_0003_exp_003
  instruction: 'Implement a fintech trading platform configuration with F# Options pattern:

    1. Define options types for TradingOptions (max position size, slippage tolerance), RiskOptions (var limit, max drawdown),
    and MarketDataOptions (refresh interval, cache size, providers list)

    2. Bind from appsettings.json and a secure vault service (simulated with in-memory dictionary)

    3. Use IOptionsMonitor<RiskOptions> for real-time risk parameter updates and IOptionsSnapshot<TradingOptions> per trading
    session

    4. Validate using custom validators ensuring var limit doesn''t exceed regulatory maximums and providers list isn''t empty

    5. Demonstrate configuration change notifications for critical risk parameters'
- id: dotnet_0003_exp_004
  instruction: 'Build a social media analytics dashboard configuration system in F#:

    1. Create options types for AnalyticsOptions (sampling rate, aggregation window), VisualizationOptions (chart colors,
    default time range), and DataSourceOptions (API keys, rate limits, cache TTL)

    2. Bind from appsettings.json, user-specific settings stored in a database (simulated with JSON), and feature flags

    3. Use IOptions<VisualizationOptions> for UI defaults and IOptionsMonitor<DataSourceOptions> for dynamic API key rotation

    4. Validate with DataAnnotations (e.g., [Url] for API endpoints) and custom validation ensuring sampling rate is between
    0.1 and 1.0

    5. Handle configuration decryption for sensitive API keys'
- id: dotnet_0003_exp_005
  instruction: 'Create a multi-tenant SaaS application configuration module in F#:

    1. Define options types for TenantOptions (database connection string, theme settings), BillingOptions (plan limits, invoice
    period), and FeatureOptions (enabled modules, access controls)

    2. Bind tenant-specific configuration from a per-tenant JSON file (e.g., tenant_{id}.json) in addition to base appsettings.json

    3. Use IOptionsSnapshot<TenantOptions> per request (based on tenant context) and IOptionsMonitor<BillingOptions> for plan
    changes

    4. Validate connection strings format and plan limits are positive integers

    5. Demonstrate configuration isolation between tenants and hot-reloading tenant settings'
- id: dotnet_0003_exp_006
  instruction: 'Design a gaming server matchmaking configuration system in F#:

    1. Create options types for MatchmakingOptions (max queue time, skill variance), GameServerOptions (instance count, region
    weights), and RewardOptions (xp multipliers, loot drop rates)

    2. Bind from appsettings.json, game mode specific JSON files, and player count-based configuration overrides

    3. Use IOptionsMonitor<MatchmakingOptions> for dynamic difficulty adjustment and IOptionsSnapshot<GameServerOptions> per
    match

    4. Validate with custom rules ensuring region weights sum to 1.0 and loot drop rates are between 0-1

    5. Show how to handle configuration rollback if validation fails after hot-reload'
- id: dotnet_0003_exp_007
  instruction: 'Implement a logistics tracking system configuration in F#:

    1. Define options types for TrackingOptions (update frequency, geofence radius), RouteOptimizationOptions (algorithm,
