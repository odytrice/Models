  instruction: Implement a database migration strategy for a microservice architecture using FluentMigrator in C#. Create
    a console application that can run migrations for multiple services in parallel, with retry logic for transient database
    errors. Include configuration for different environments (dev, staging, production) and implement a custom version table
    that tracks which service each migration belongs to.
- id: dotnet_0015_exp_001
  instruction: Design a FluentMigrator-based schema evolution system for a multi-tenant SaaS application. Each tenant has
    isolated schemas, and migrations need to be applied to all tenant schemas. Create a migration runner that can apply migrations
    to multiple schemas concurrently, with progress tracking and the ability to rollback failed migrations on specific tenants
    without affecting others.
- id: dotnet_0015_exp_002
  instruction: Write a FluentMigrator migration that converts a legacy denormalized table structure to a normalized schema
    for an e-commerce product catalog. Include data transformation that preserves existing data, handles NULL values gracefully,
    and creates appropriate indexes. Add validation to ensure data integrity after the migration.
- id: dotnet_0015_exp_003
  instruction: Create a FluentMigrator extension for generating database documentation from migration classes. The tool should
    parse migration attributes and SQL expressions to produce markdown documentation of the schema evolution, including column
    types, constraints, and relationships between tables.
- id: dotnet_0015_exp_004
  instruction: Implement a blue-green deployment strategy for database migrations using FluentMigrator. Write migration classes
    that are idempotent and backward-compatible, allowing the application to run against both old and new schema versions
    during deployment. Include rollback procedures and health checks.
- id: dotnet_0015_exp_005
  instruction: Build a migration testing framework using FluentMigrator and TestContainers. Write tests that verify migrations
    can be applied and rolled back without data loss, that foreign key constraints are correctly maintained, and that performance-critical
    indexes are created. Include integration tests for complex data migrations.
- id: dotnet_0015_exp_006
  instruction: Create a FluentMigrator migration for a GDPR-compliant data anonymization system. Implement migrations that
    add pseudonymization columns, create audit tables for data access, and provide reversible migrations for testing purposes.
    Include encryption for sensitive fields using database-native functions.
- id: dotnet_0015_exp_007
  instruction: Design a database versioning system for a mobile app backend that supports schema migrations on SQLite for
    local device storage and PostgreSQL for server storage. Use FluentMigrator to write compatible migrations for both database
    systems, handling their SQL dialect differences through abstractions.
- id: dotnet_0015_exp_008
  instruction: Implement a migration that partitions a large fact table in a data warehouse by date range using FluentMigrator.
    Include the creation of partition functions, schemes, and moving existing data to appropriate partitions. Add maintenance
    jobs for partition switching and archiving old data.
- id: dotnet_0015_exp_009
  instruction: Create a FluentMigrator migration for implementing soft delete pattern across multiple tables. Add `IsDeleted`
    and `DeletedAt` columns to existing tables, update foreign key constraints to ignore soft-deleted records, and create
    indexes for efficient querying of non-deleted records.
- id: dotnet_0015_exp_010
  instruction: Write a complex migration that refactors a polymorphic association (using type and id columns) to proper foreign
    keys with junction tables. Include data migration that preserves all relationships, handles orphaned records, and maintains
    referential integrity. Add appropriate indexes for performance.
- id: dotnet_0015_exp_011
  instruction: Implement a database migration rollback strategy for failed deployments. Create a FluentMigrator-based tool
    that can detect failed migrations, automatically revert to the last known good version, and send alerts to the DevOps
    team. Include support for both forward and backward migrations.
- id: dotnet_0015_exp_012
  instruction: Design a FluentMigrator migration for adding full-text search capabilities to existing product and article
    tables. Create computed columns, full-text indexes, and implement migration of existing data with re-indexing. Include
    performance considerations for large datasets.
