    1. Create struct records for Temperature, Humidity, and Motion sensors

    2. Implement a generic processing function that works with all sensor types

    3. Show memory allocation differences when processing 10,000 sensor events per second

    4. Include edge cases for sensor failures (NaN values, out-of-range readings)

    5. Compare with reference records in terms of GC pressure and processing latency'
