teacher: deepseek
domain: fsharp_core
system_prompt: 'You are an expert F# developer. Write idiomatic, production-quality F# code.

  Follow these conventions:

  - Use pipeline operators (|>) for data transformations

  - Prefer immutable data (records, DUs) over mutable state

  - Use pattern matching extensively

  - Use computation expressions where appropriate

  - Include type annotations on public APIs

  - Write concise explanations (2-3 sentences max) before the code

  - All code must compile with .NET 9 and F# 9

  '
temperature: 0.6
max_tokens: 4096
prompts:
- id: fsharp_core_0001_exp_000
  instruction: 'Implement an F# discriminated union to represent different file formats in a document processing system (PDF,
