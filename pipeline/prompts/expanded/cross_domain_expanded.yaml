- id: cross_0008_exp_020
  instruction: Optimize JWT cryptographic operations in F# Giraffe for high-frequency trading scenarios. Implement async/await
    patterns for RSA signature validation using hardware security modules (HSM) via Azure Key Vault or AWS KMS, cache validated
    token signatures to avoid redundant crypto operations, and use Span<T> and Memory<T> for zero-allocation JWT parsing.
    Benchmark ECDSA vs RSA performance for different key sizes, implement algorithm agility to support multiple signing algorithms
