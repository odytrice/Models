- id: cross_0002_exp_000
  instruction: 'Build an IoT agriculture monitoring system for soil moisture sensors:

    - F# backend: Akka.NET actor per sensor field aggregating moisture levels, Giraffe SSE endpoint for real-time telemetry

    - F# data layer: linq2db time-series queries to PostgreSQL for weekly irrigation trends

    - SvelteKit frontend: Server load function fetching field metadata, SSE connection for live moisture gauges

    - Svelte 5 components: Radial gauges using $state for sensor values, $derived for average moisture calculations per zone

    - Docker Compose: Multi-service setup with health checks on PostgreSQL, simulated MQTT broker for sensor input

    Include graceful SSE reconnection logic and sensor offline detection.'
