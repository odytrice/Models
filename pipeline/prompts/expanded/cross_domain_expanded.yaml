  instruction: Build a Backend-for-Frontend (BFF) authentication pattern using F# Giraffe for a React SPA, implementing the
    Token Exchange extension grant (RFC 8693) to swap external IdP tokens for internal microservice tokens. Create custom
    HttpHandlers for claim transformation (mapping external groups to internal roles), scope filtering based on client capabilities,
    and token introspection for opaque reference tokens. Implement secure httpOnly sameSite=strict cookies for the browser-to-BFF
    communication while using mTLS service account certificates for BFF-to-downstream-service communication. Include comprehensive
    logging of token exchange events for security auditing.
- id: cross_0008_exp_007
  instruction: Design service-to-service authentication for a microservices architecture using F# Giraffe with mutual TLS
    (mTLS) and JWT propagation. Implement a custom HttpHandler that extracts the client certificate from the TLS handshake,
    validates it against a SPIFFE/SPIRE workload identity provider, and embeds service identity claims into the request context
    for downstream propagation. Include a sidecar pattern implementation where Giraffe runs as an auth proxy in Docker containers,
    handling token caching and refresh on behalf of business services. Create token forwarding logic that maintains the original
    user context (impersonation/delegation) through the service chain using nested JWTs.
- id: cross_0008_exp_008
  instruction: Debug and fix race condition issues in a distributed token refresh mechanism using F# Giraffe and SvelteKit.
    Implement a distributed lock using Redis RedLock algorithm to prevent multiple simultaneous refresh token requests from
    creating session inconsistencies. Create idempotent token refresh endpoints that handle network partitions gracefully,
    with token family detection to detect refresh token rotation violations (indicating potential token theft). Include comprehensive
    telemetry using OpenTelemetry to trace refresh flows across distributed systems, and implement client-side request deduplication
    in SvelteKit using the Singleton Promise pattern for concurrent API calls during token expiry.
- id: cross_0008_exp_009
  instruction: Implement a SAML2 to OIDC bridge using F# Giraffe for enterprise SSO integration with legacy on-premise Identity
    Providers. Parse SAML 2.0 assertions using the ITfoxtec SAML2 library, transform SAML attributes to OIDC claims, and implement
    cryptographic validation of SAML signatures using X509 certificates stored in Azure Key Vault. Create a session persistence
    layer that maintains mappings between SAML NameIDs and OIDC sub claims, supporting both SP-initiated and IdP-initiated
    SSO flows. Frontend must handle the SAML POST binding artifacts and relay state management, converting them to modern
    OAuth2 PKCE flows for the SvelteKit application.
- id: cross_0008_exp_010
  instruction: Build real-time WebSocket authentication for a stock trading platform using F# Giraffe with SignalR integration.
    Implement a custom authentication handler that validates JWT tokens from the WebSocket query string during the handshake,
    with token refresh capabilities over the persistent connection. Include subscription-based authorization where users can
    only receive market data for exchanges they have entitlements to, implemented via claims validation in the WebSocket message
    pipeline. Implement heartbeat mechanisms to detect stale connections and server-side token refresh without dropping the
    WebSocket connection, with fallback to Long Polling for corporate networks blocking WebSockets.
- id: cross_0008_exp_011
  instruction: Optimize JWT validation for serverless Azure Functions using F# with Giraffe-style composition. Implement cold-start
    optimization techniques including Ahead-of-Time (AOT) compilation for JWT signature validation, caching of OpenID Connect
    discovery documents in Azure Blob Storage, and managed identity integration for Azure Key Vault secret retrieval. Create
    a custom startup bootstrapper that pre-validates signing keys before the first request, and implement token validation
    caching using Azure Redis Cache with local in-memory fallback for consumption plans. Include graceful handling of Azure
    Function scale-out events where multiple instances validate the same token simultaneously.
- id: cross_0008_exp_012
  instruction: Implement field-level authorization for a GraphQL API using F# Giraffe with HotChocolate. Create a custom authorization
    directive that evaluates policies based on JWT claims at query execution time, supporting ABAC (Attribute-Based Access
    Control) where field visibility depends on user attributes and resource data. Implement query complexity analysis to prevent
    DoS attacks using expensive nested authorization checks, and create a data loader pattern that batches authorization checks
    for N+1 query scenarios. Include introspection schema filtering that hides fields the authenticated user cannot access,
    and implement persisted queries with pre-authorized signatures.
- id: cross_0008_exp_013
  instruction: Design GDPR-compliant authentication with right to erasure support using F# Giraffe. Implement cryptographic
    erasure of user sessions where refresh tokens are encrypted with user-specific keys that can be deleted (crypto-shredding),
    anonymization of audit logs using one-way hashing of user identifiers, and automated personal data export in machine-readable
    formats (JSON). Create middleware that checks for user consent expiration before processing requests, implements data
    retention policies that automatically purge expired sessions, and handles the "right to be forgotten" by propagating deletion
    requests to all microservices via outbox pattern events.
- id: cross_0008_exp_014
  instruction: Implement Zero Trust architecture authentication using F# Giraffe with continuous validation. Create short-lived
    access tokens (5-minute expiration) with real-time revocation checking against a high-performance Redis-backed CRL (Certificate
    Revocation List) for tokens. Implement device posture validation middleware that checks for jailbroken devices, geolocation
    anomalies, and IP reputation before issuing tokens. Include step-up authentication triggers that require re-verification
    for sensitive operations based on risk scoring, and implement secure session binding that ties tokens to TLS parameters
    to prevent token export and replay attacks.
- id: cross_0008_exp_015
  instruction: Build OAuth2 Device Authorization Grant implementation for a CLI tool using F# Giraffe. Create endpoints for
