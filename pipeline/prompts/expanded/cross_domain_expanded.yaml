    claim validation that can be unit tested without HttpContext. Include property-based testing using FsCheck to verify that
    the refactored authentication pipeline maintains all security invariants of the original implementation, and benchmark
    the functional approach against the OOP baseline for throughput comparison.
- id: cross_0008_exp_018
  instruction: Create comprehensive integration testing strategy for Giraffe authentication using Microsoft.AspNetCore.TestHost.
