- id: general_0010_exp_015
  instruction: Explain how the Mediator pattern's central coordination translates to message-passing and actor systems in
    Erlang/Elixir. Implement a chat room with multiple users using both Java and Elixir, comparing coupling and concurrency
    models.
- id: general_0010_exp_016
  instruction: Show how the Iterator pattern from OOP relates to lazy sequences and generator functions in functional programming.
