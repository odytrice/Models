  instruction: Convert the Event Sourcing pattern from OOP to persistent event streams and fold/reduce operations in functional
    programming. Implement a bank account balance calculator using both mutable state with events and immutable fold, discussing
    auditability.
- id: general_0010_exp_025
  instruction: Explain how the CQRS pattern's separation translates to different data types and function signatures in functional
    programming. Implement a user management system with separate command and query models in both C# and F#, discussing consistency
    boundaries.
- id: general_0010_exp_026
  instruction: Show how the Circuit Breaker pattern from OOP relates to effect systems and error-handling monads in functional
    programming. Implement a resilient HTTP client using both Java and Scala with cats-effect, comparing failure recovery
