    extensibility.
- id: general_0010_exp_018
  instruction: Translate the Repository pattern from OOP to query combinators and free monads in Scala. Implement a data access
    layer for a user repository using both approaches, and compare testability and abstraction levels.
- id: general_0010_exp_019
  instruction: Convert the Specification pattern from OOP to predicate functions and combinator libraries in F#. Implement
    business rule validation for loan applications using both approaches, showing how the functional version enables easier
    composition.
- id: general_0010_exp_020
  instruction: Explain how the Value Object pattern in OOP relates to structural equality and immutable data types in functional
