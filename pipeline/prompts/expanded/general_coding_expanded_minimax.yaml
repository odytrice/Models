  instruction: Show how the Composite pattern from OOP translates to recursive algebraic data types in functional programming.
    Implement a file system hierarchy (files and directories) in both Java and Scala, highlighting how pattern matching simplifies
    operations.
- id: general_0010_exp_007
  instruction: Demonstrate how the Flyweight pattern's object pooling compares to memoization and lazy evaluation in functional
    languages. Implement a text formatting system with shared character properties using both approaches, and discuss memory
    trade-offs.
- id: general_0010_exp_008
  instruction: Translate the Chain of Responsibility pattern from OOP to function pipelines and monadic bind operations in
    F#. Create a request validation chain with authentication, authorization, and rate limiting steps, comparing error propagation
