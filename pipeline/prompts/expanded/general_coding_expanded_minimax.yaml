  instruction: Show how the Factory pattern in OOP translates to smart constructors and module systems in OCaml. Implement
    both versions for creating different types of payment processors (CreditCard, PayPal, Crypto) and compare error handling
    approaches.
- id: general_0010_exp_002
  instruction: Demonstrate how the Singleton pattern's OOP implementation compares to using a module in ML-family languages.
    Create both versions for a configuration manager that reads environment variables, and discuss thread-safety implications
    in each paradigm.
- id: general_0010_exp_003
  instruction: Translate the Template Method pattern from OOP to higher-order functions in Elixir. Implement a data export
