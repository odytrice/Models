    adding new operations.
- id: general_0010_exp_011
  instruction: Show how the Prototype pattern's object cloning compares to structural sharing and copy-on-write techniques
    in functional programming. Implement a graphic editor with shape duplication using both Java and Clojure, discussing deep
    vs shallow copying issues.
- id: general_0010_exp_012
  instruction: Demonstrate how the Facade pattern from OOP translates to module signatures and interface files in Standard
    ML. Create a simplified API for a complex database layer using both approaches, and discuss information hiding mechanisms.
- id: general_0010_exp_013
  instruction: Translate the Bridge pattern's abstraction/implementation separation to type classes and dependency injection
    in Haskell. Implement multiple rendering backends (OpenGL, Vulkan) for a graphics library using both approaches, comparing
