  instruction: 'Design a waste management route optimization service. Cover:

    1. API for pickup requests, route planning, and driver assignments

    2. Database schema for customers, pickup locations, and vehicle capacity

    3. Route optimization algorithm (traveling salesman variant)

    4. Real-time tracking and ETA predictions

    5. Billing and payment processing

    6. Recycling metrics and sustainability reporting

    Write the F# implementation with Giraffe, including geospatial route calculations.'
- id: general_0009_exp_000
  instruction: 'Implement a distributed session management service for an e-commerce platform using Giraffe.

    Support three storage backends: Redis, SQL Server, and in-memory cache.

    For each: explain the consistency model, implement the storage interface, show trade-offs (latency, scalability, persistence).

    Include Giraffe middleware that automatically handles session creation, renewal, and expiration.

    Add configuration for different session timeout policies based on user type (guest, logged-in, admin).'
- id: general_0009_exp_001
  instruction: 'Design a content negotiation middleware for a healthcare API that supports multiple response formats.

    Implement handlers for: JSON (with FHIR standards), XML, CSV for data export, and Protocol Buffers.

    For each: explain the serialization approach, implement content type detection, show trade-offs (performance, compatibility).

    Include a Giraffe pipeline that respects Accept headers and provides format-specific error responses.

    Add support for versioning through content type parameters (application/fhir+json; fhirVersion=4.0).'
- id: general_0009_exp_002
  instruction: 'Create a request validation and sanitization middleware for a social media platform.

    Implement validators for: user registration data, post content, file upload metadata, and API parameters.

    For each: explain validation rules, implement with Giraffe''s HttpHandler composition, show trade-offs (completeness vs
    performance).

    Include automatic response generation for validation failures with detailed error messages.

    Add support for conditional validation based on user roles and content type.'
- id: general_0009_exp_003
  instruction: 'Build a comprehensive logging middleware for a fintech transaction processing system.

    Implement three log levels: audit (regulatory), diagnostic (debugging), and metrics (performance).

    For each: explain what data to capture, implement structured logging, show trade-offs (data volume vs usefulness).

    Include Giraffe middleware that logs request/response cycles with correlation IDs.

    Add configurable log destinations: console, file, and external logging service via plugins.'
- id: general_0009_exp_004
  instruction: 'Design an API versioning system for a SaaS platform with backward compatibility requirements.

    Implement three versioning strategies: URL path (/api/v1/resource), query parameter (?version=1), and header (X-API-Version).

    For each: explain routing approach, implement version negotiation, show trade-offs (discoverability, caching).

    Include Giraffe middleware that handles version fallback and deprecated endpoint warnings.

    Add automated documentation generation for each API version.'
- id: general_0009_exp_005
  instruction: 'Implement a file upload service with virus scanning for an enterprise document management system.

    Support three file processing modes: immediate scan, deferred processing, and quarantine review.

    For each: explain the workflow, implement async processing with Giraffe, show trade-offs (user experience vs security).

    Include Giraffe middleware that validates file types, sizes, and metadata before accepting uploads.

    Add progress tracking and notification when scanning completes.'
- id: general_0009_exp_006
  instruction: 'Create a real-time notification system for an IoT device monitoring platform using Server-Sent Events (SSE).

    Implement three subscription models: device-specific, location-based, and alert-type filtering.

    For each: explain connection management, implement event stream endpoints, show trade-offs (connection overhead vs real-time).

    Include Giraffe middleware that manages SSE connections with automatic reconnection handling.

    Add rate limiting per connection and authentication for sensitive device data.'
- id: general_0009_exp_007
  instruction: 'Design an authentication middleware for a multi-tenant B2B application.

    Implement three authentication methods: JWT tokens, API keys, and OAuth 2.0 delegation.

    For each: explain the auth flow, implement token validation, show trade-offs (security complexity vs user experience).

    Include Giraffe middleware that extracts tenant context from authenticated requests.

    Add support for simultaneous multi-method authentication for different API endpoints.'
- id: general_0009_exp_008
  instruction: 'Build a response caching layer for a news aggregation service with varying cache policies.

    Implement three caching strategies: time-based expiration, conditional ETag validation, and content-based invalidation.

    For each: explain cache key generation, implement response interception, show trade-offs (freshness vs performance).

    Include Giraffe middleware that respects Cache-Control headers and bypasses caching for authenticated requests.

    Add cache warming for high-traffic endpoints during low-usage periods.'
- id: general_0009_exp_009
  instruction: 'Create a request/response transformation middleware for a legacy system migration.

    Implement three transformation types: field name mapping (camelCase to snake_case), data format conversion, and field
    value transformation.

    For each: explain transformation rules, implement bidirectional mapping, show trade-offs (maintenance complexity).

    Include Giraffe middleware that applies transformations based on content type and API version.

    Add transformation rule configuration via external files for easy updates.'
- id: general_0009_exp_010
  instruction: 'Implement a webhook delivery system for a payment processing gateway.

    Support three delivery guarantees: at-most-once, at-least-once, and exactly-once with idempotency keys.

    For each: explain the delivery algorithm, implement retry logic with exponential backoff, show trade-offs (reliability
    vs complexity).

    Include Giraffe middleware that validates webhook signatures and processes async deliveries.

    Add webhook status tracking and manual retry capabilities in admin interface.'
- id: general_0009_exp_011
  instruction: 'Design a feature flag system for A/B testing in a mobile app backend.

    Implement three flag evaluation strategies: user percentage rollout, targeted user segments, and gradual geographic rollout.

    For each: explain the decision logic, implement flag evaluation middleware, show trade-offs (flexibility vs performance).

    Include Giraffe middleware that injects feature flag context into requests for consistent evaluation.

    Add real-time flag updates without application restarts using configuration reloading.'
- id: general_0009_exp_012
  instruction: 'Build a request correlation and tracing system for a microservices architecture.

    Implement three trace propagation formats: W3C Trace Context, Zipkin B3 headers, and custom correlation IDs.

    For each: explain the header format, implement context propagation, show trade-offs (standard compliance vs simplicity).

    Include Giraffe middleware that generates and propagates correlation IDs across service boundaries.

    Add structured logging that includes correlation context for all log entries.'
- id: general_0009_exp_013
  instruction: 'Create a quota management system for a cloud API platform with tiered pricing.

    Implement three quota types: request count per period, data transfer volume, and concurrent connection limits.

    For each: explain quota calculation, implement usage tracking, show trade-offs (accuracy vs storage overhead).

    Include Giraffe middleware that checks quotas before processing requests and returns appropriate HTTP 429 responses.

    Add near-real-time quota usage reporting for users via separate API endpoints.'
- id: general_0009_exp_014
  instruction: 'Implement a health check and readiness probe system for a containerized application.

    Support three check types: basic endpoint availability, dependency health (database, cache), and custom business logic
    checks.

    For each: explain the check criteria, implement async health evaluation, show trade-offs (comprehensiveness vs response
    time).

    Include Giraffe middleware that exposes health endpoints with configurable sensitivity levels.

    Add circuit breaker pattern for dependent services to prevent cascading failures.'
- id: general_0009_exp_015
  instruction: 'Design a request decompression middleware for a data processing pipeline accepting compressed uploads.

    Implement three compression formats: GZIP, Brotli, and DEFLATE with automatic format detection.

    For each: explain decompression algorithm, implement streaming decompression, show trade-offs (CPU vs bandwidth).

    Include Giraffe middleware that decompresses request bodies before routing to handlers.

    Add size limits and compression ratio checks to prevent decompression bombs.'
- id: general_0009_exp_016
  instruction: 'Build an API usage analytics middleware for a developer platform.

    Track three metric categories: endpoint usage frequency, response time percentiles, and error rate by client.

    For each: explain metric collection, implement lightweight in-process aggregation, show trade-offs (detail vs performance
    impact).

    Include Giraffe middleware that captures metrics without disrupting request processing.

    Add configurable metric export to external monitoring systems.'
- id: general_0009_exp_017
  instruction: 'Create a request signing and verification middleware for a high-security government system.

    Implement three signature algorithms: HMAC-SHA256, RSA-SHA512, and Ed25519 for cryptographic verification.

    For each: explain the signing process, implement signature validation, show trade-offs (computational cost vs security).

    Include Giraffe middleware that validates request signatures and timestamps to prevent replay attacks.

    Add support for rotating signing keys without service interruption.'
- id: general_0009_exp_018
  instruction: 'Implement a content filtering middleware for a user-generated content platform.

    Support three filtering approaches: keyword blocking, regex pattern matching, and AI-based content classification.

    For each: explain filtering logic, implement configurable rule sets, show trade-offs (precision vs false positives).

    Include Giraffe middleware that screens request bodies and returns appropriate rejection responses.

    Add audit logging for filtered content with moderator review capabilities.'
- id: general_0009_exp_019
  instruction: 'Design a localization middleware for a global e-learning platform.

    Implement three locale resolution strategies: URL prefix (/en-us/), Accept-Language header, and user profile setting.

    For each: explain locale detection, implement request context localization, show trade-offs (caching complexity).

    Include Giraffe middleware that injects locale context and formats responses accordingly.

    Add support for region-specific content variations and fallback locales.'
- id: general_0009_exp_020
  instruction: 'Build a request enrichment middleware that adds contextual data from external services.

    Implement three enrichment sources: user profile service, geolocation from IP, and device detection from user agent.

    For each: explain data fetching, implement async enrichment with caching, show trade-offs (latency vs usefulness).

    Include Giraffe middleware that fetches enrichment data in parallel before request processing.

    Add circuit breakers and fallback values for enrichment service failures.'
- id: general_0009_exp_021
  instruction: 'Create a response compression middleware optimized for different content types.

    Implement three compression strategies: dynamic based on Accept-Encoding, pre-compressed static assets, and selective
    compression by content type.

    For each: explain compression decision logic, implement efficient compression pipelines, show trade-offs (CPU vs bandwidth
    savings).

    Include Giraffe middleware that compresses responses while respecting client capabilities.

    Add Brotli quality level configuration for different content types.'
- id: general_0009_exp_022
  instruction: 'Implement a cross-origin resource sharing (CORS) middleware with fine-grained policy control.

    Support three policy configurations: per-origin rules, per-endpoint policies, and dynamic origin validation.

    For each: explain CORS header generation, implement preflight request handling, show trade-offs (security vs flexibility).

    Include Giraffe middleware that applies CORS policies based on request characteristics.

    Add CORS policy analytics to track origin usage patterns.'
- id: general_0009_exp_023
  instruction: 'Design a request buffering and streaming middleware for large payload processing.

    Implement three processing modes: full buffering for validation, chunked streaming, and hybrid approach with size thresholds.

    For each: explain memory management, implement configurable buffering strategies, show trade-offs (memory usage vs functionality).

    Include Giraffe middleware that selects processing mode based on content type and size.

    Add progress reporting for streaming uploads.'
- id: general_0009_exp_024
  instruction: 'Build a request deduplication middleware for an idempotent API handling financial transactions.

    Implement three deduplication methods: client-provided idempotency keys, request content hashing, and time-window based
    detection.

    For each: explain deduplication logic, implement storage for processed requests, show trade-offs (storage vs protection).

    Include Giraffe middleware that detects duplicates and returns cached responses.

    Add configurable deduplication window and cleanup of old entries.'
- id: general_0009_exp_025
  instruction: 'Create a response pagination middleware for large dataset endpoints.

    Implement three pagination styles: offset/limit, cursor-based, and keyset pagination.

    For each: explain the implementation approach, implement query modification, show trade-offs (performance consistency).

    Include Giraffe middleware that automatically adds pagination metadata to responses.

    Add support for custom page sizes and sorting parameters.'
- id: general_0009_exp_026
  instruction: 'Implement a request rewriting middleware for URL normalization and redirection.

    Support three rewrite types: trailing slash normalization, lowercase enforcement, and pattern-based URL rewriting.

    For each: explain rewrite rules, implement efficient pattern matching, show trade-offs (processing overhead).

    Include Giraffe middleware that applies rewrites before routing decisions.

    Add rewrite rule configuration via external files with hot reload.'
- id: general_0009_exp_027
  instruction: 'Design a multipart form data processing middleware with streaming file handling.

    Implement three parsing strategies: in-memory for small forms, disk-backed streaming for large files, and hybrid approach.

    For each: explain parsing algorithm, implement async processing, show trade-offs (memory vs disk I/O).

    Include Giraffe middleware that processes multipart requests and provides easy access to form fields and files.

    Add validation for individual form fields and file constraints.'
- id: general_0009_exp_028
  instruction: 'Build a response templating middleware for dynamic error pages and maintenance messages.

    Implement three template sources: embedded resources, filesystem templates, and database-stored templates.

    For each: explain template rendering, implement context injection, show trade-offs (flexibility vs performance).

    Include Giraffe middleware that intercepts error responses and applies appropriate templates.

    Add template caching with invalidation on changes.'
- id: general_0009_exp_029
  instruction: 'Create a request timing middleware for performance monitoring and slow request detection.

    Implement three timing metrics: total request time, time to first byte, and individual middleware component timing.

    For each: explain timing collection, implement high-resolution timing, show trade-offs (overhead vs insight).

    Include Giraffe middleware that measures request processing and logs slow requests.

    Add configurable thresholds for different endpoint categories.'
- id: general_0010_exp_000
  instruction: Explain how the Visitor pattern from OOP translates to pattern matching in functional programming languages
    like Scala or Haskell. Provide code examples comparing a Java Visitor implementation with a Scala pattern matching solution
