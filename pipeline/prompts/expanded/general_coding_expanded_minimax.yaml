  instruction: Convert the Blackboard pattern from OOP to shared immutable data and message passing in Erlang. Implement a
    collaborative filtering system using both approaches, comparing coordination mechanisms and fault tolerance.
- id: general_0011_exp_000
  instruction: 'Implement the builder pattern in C# for constructing complex email messages.

    Define a fluent interface with methods for setting recipients, subject, body, attachments, and priority.

    Ensure the builder validates required fields (at least one recipient, non-empty subject) before building.

    Add support for both HTML and plain text body formats with automatic fallback.

    Demonstrate creating a multipart MIME email with attachments and CC/BCC recipients.'
- id: general_0011_exp_001
  instruction: 'Design a state machine DSL in Python for modeling elevator behavior.

    Define states (Idle, MovingUp, MovingDown, DoorsOpen) and events (CallRequest, FloorReached, DoorTimeout).

    Implement an interpreter that validates state transitions and can generate a state transition diagram in Graphviz DOT
    format.

    Add timing constraints (minimum door open time, maximum wait time) and handle invalid transitions gracefully.

    Demonstrate a scenario where two elevators coordinate in a building with multiple floors.'
- id: general_0011_exp_002
  instruction: 'Create a validation rule DSL in TypeScript for user registration forms.

    Define combinators for string length, regex patterns, required fields, and cross-field validation (password confirmation).

    Write an interpreter that runs validation on form data and returns detailed error messages per field.

    Implement a second interpreter that generates client-side validation code for React forms.

    Add support for asynchronous validation (username availability check) using Promises.'
- id: general_0011_exp_003
  instruction: 'Implement the visitor pattern in Java for analyzing abstract syntax trees of a simple calculator language.

    Define expression nodes for numbers, variables, and operations (+, -, *, /).

    Create visitors for evaluation (with variable lookup), pretty printing, and dependency analysis (extracting variable names).

    Handle division by zero and undefined variables with appropriate error messages.

    Demonstrate evaluating an expression with nested operations and multiple variables.'
- id: general_0011_exp_004
  instruction: 'Design a workflow DSL in Kotlin for processing e-commerce orders.

    Define steps: ValidateInventory, CalculateTax, ProcessPayment, UpdateInventory, SendNotification.

    Implement an interpreter that executes steps sequentially with error handling and rollback capabilities.

    Add conditional steps (e.g., gift wrapping only if selected) and parallel execution for independent steps.

    Demonstrate a complete order flow with payment failure retry logic and inventory rollback on failure.'
- id: general_0011_exp_005
  instruction: 'Create a configuration DSL in Ruby for setting up CI/CD pipeline jobs.

    Define stages, jobs, environment variables, and dependencies between jobs.

    Write an interpreter that validates the configuration and generates YAML for GitHub Actions.

    Add constraints: maximum concurrent jobs, timeout per stage, required approvals for production.

    Demonstrate configuring a pipeline with test, build, and deploy stages with parallel test jobs.'
- id: general_0011_exp_006
  instruction: 'Implement a query DSL in Scala for filtering log events.

    Define combinators for timestamp ranges, log levels (ERROR, WARN, INFO), message patterns, and field comparisons.

    Write an interpreter that generates Elasticsearch query JSON with proper escaping of special characters.

    Implement a second interpreter that optimizes queries by combining overlapping ranges and removing redundant conditions.

    Demonstrate querying for errors from the last hour containing specific keywords across multiple services.'
- id: general_0011_exp_007
  instruction: 'Design a test specification DSL in Haskell for property-based testing.

    Define generators for primitive types, lists, and custom data types with constraints.

    Write an interpreter that runs QuickCheck-style tests with configurable sample size and failure reporting.

    Add support for stateful testing using command sequences and model checking.

    Demonstrate testing a red-black tree implementation with invariants (ordering, coloring rules).'
- id: general_0011_exp_008
  instruction: 'Create a data transformation pipeline DSL in Clojure for ETL processes.

    Define operations: map, filter, group-by, aggregate, join, and window functions.

    Implement an interpreter that compiles to Apache Spark transformations with optimization for predicate pushdown.

    Add schema validation for each step and type inference where possible.

    Demonstrate processing a stream of sensor data to compute rolling averages and detect anomalies.'
- id: general_0011_exp_009
  instruction: 'Implement a permission rule DSL in Rust for an RBAC (Role-Based Access Control) system.

    Define rules combining resources, actions, conditions (time-based, IP range), and deny/allow effects.

    Write an interpreter that evaluates rules efficiently using a decision tree with caching.

    Ensure rules are evaluated in order with early exit on explicit deny.

    Demonstrate a hierarchical resource model where permissions can be inherited from parent resources.'
- id: general_0011_exp_010
  instruction: 'Design a UI component DSL in Elixir for generating dynamic web forms.

    Define field types (text, number, select, checkbox) with validation rules and layout hints.

    Write an interpreter that renders LiveView components with real-time validation.

    Implement a second interpreter that generates JSON Schema for API documentation.

    Demonstrate a nested form with conditional fields that appear based on other field values.'
- id: general_0011_exp_011
  instruction: 'Create a scheduling DSL in Go for cron-like job definitions with dependencies.

    Define jobs with commands, schedules, and dependencies (run A before B, C after B).

    Implement an interpreter that validates for cycles and generates an execution DAG.

    Add resource constraints (maximum concurrent jobs, memory limits) and retry policies.

    Demonstrate a pipeline where data processing jobs depend on data ingestion completing successfully.'
- id: general_0011_exp_012
  instruction: 'Implement a pattern matching DSL in Swift for processing tree-structured data (like XML/JSON).

    Define patterns for matching nodes by name, attributes, and nested content with wildcards.

    Write an interpreter that extracts data from parsed trees into typed structures.

    Add support for optional matching, repetition, and pattern composition.

    Demonstrate extracting product information from an e-commerce website HTML structure.'
- id: general_0011_exp_013
  instruction: 'Design a circuit simulation DSL in Julia for digital logic design.

    Define gates (AND, OR, NOT), wires, clocks, and memory elements (flip-flops).

    Implement an interpreter that simulates circuit behavior over time and detects race conditions.

    Add visualization of signal waveforms over multiple clock cycles.

    Demonstrate building and simulating a 4-bit counter with reset functionality.'
- id: general_0011_exp_014
  instruction: 'Create a graph query DSL in Python for social network analysis.

    Define operations: find paths, detect communities, calculate centrality, and filter by node/edge properties.

    Write an interpreter that generates efficient NetworkX or Neo4j Cypher queries.

    Implement optimizations for common patterns like friend-of-friend queries with depth limits.

    Demonstrate finding mutual connections between users and recommending new connections.'
- id: general_0011_exp_015
  instruction: 'Implement a text templating DSL in JavaScript with inheritance and partials.

    Define template inheritance blocks, includes, and custom filters (uppercase, date format).

    Write an interpreter that compiles templates to efficient render functions with caching.

    Add XSS protection by auto-escaping variables and allowing safe HTML only via explicit markers.

    Demonstrate a email template system with a base layout and pluggable content sections.'
- id: general_0011_exp_016
  instruction: 'Design a localization DSL in TypeScript for managing multi-language UI strings.

    Define parameterized strings with pluralization, gender, and formatting rules.

    Write an interpreter that selects the correct translation based on locale and interpolates parameters.

    Implement fallback chains (en-US → en → default) and missing key detection.

    Demonstrate a React component that switches languages dynamically with formatted dates and numbers.'
- id: general_0011_exp_017
  instruction: 'Create a mathematical optimization DSL in Python for linear programming.

    Define variables, constraints, and objective functions in a natural syntax.

    Write an interpreter that generates input for solvers like PuLP or Google OR-Tools.

    Add support for integer variables, piecewise-linear functions, and sensitivity analysis.

    Demonstrate optimizing a production mix problem with resource constraints and profit maximization.'
- id: general_0011_exp_018
  instruction: 'Implement a protocol buffer schema DSL in F# for defining message types.

    Define messages with fields, enums, nested types, and options (deprecated, packed).

    Write an interpreter that validates schemas and generates .proto files.

    Add support for backward compatibility rules (field numbers, reserved ranges).

    Demonstrate evolving a schema by adding optional fields while maintaining compatibility.'
- id: general_0011_exp_019
  instruction: 'Design a reactive stream DSL in Java for processing sensor data in real-time.

    Define operators: map, filter, window, merge, and debounce with backpressure handling.

    Write an interpreter that builds a Reactive Streams pipeline with error recovery.

    Implement hot/cold stream semantics and support for multiple subscribers.

    Demonstrate processing temperature readings with outlier detection and sliding window averages.'
- id: general_0011_exp_020
  instruction: 'Create a deployment specification DSL in YAML with custom extensions for Kubernetes.

    Define resources (Deployments, Services) with templating for environment-specific values.

    Write a preprocessor that validates and expands templates using variables and conditionals.

    Add constraints: resource quotas, node selectors, and health check definitions.

    Demonstrate deploying a microservice with canary release configuration.'
