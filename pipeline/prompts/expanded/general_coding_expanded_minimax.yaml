- id: general_0010_exp_021
  instruction: Show how the Null Object pattern from OOP translates to Option/Maybe types and default values in functional
    programming. Implement a logging system with silent and console loggers using both approaches, discussing type safety
    benefits.
- id: general_0010_exp_022
  instruction: Demonstrate how the Dependency Injection pattern from OOP relates to reader monads and partial application
    in Haskell. Implement a service layer requiring configuration and database access using both Spring and Haskell approaches,
