- id: general_0010_exp_009
  instruction: Convert the Memento pattern from OOP to persistent data structures and state snapshots in Clojure. Implement
    undo/redo functionality for a text editor using both mutable objects and immutable data structures, discussing time and
    space complexity.
- id: general_0010_exp_010
  instruction: Explain how the Interpreter pattern in OOP relates to algebraic data types and evaluator functions in Haskell.
