domain: general_coding
max_tokens: 4096
prompts:
- id: general_0001_exp_000
  instruction: 'Implement a generic LFU (Least Frequently Used) cache in F# with O(1) get and put operations.

    Use a combination of a Dictionary and a frequency-based doubly-linked list structure.

    Include: get, put, remove, clear, and capacity check operations.

    Write property-based tests that verify frequency ordering and eviction behavior.'
- id: general_0001_exp_001
  instruction: 'Create a time-based expiration cache in F# where entries automatically expire after a configurable TTL.

    Use a Dictionary for O(1) lookups and a priority queue (min-heap) for efficient expiration tracking.

    Include: get, put, remove, cleanup (remove expired items), and size operations.

    Write tests that verify expiration occurs correctly with simulated time.'
- id: general_0001_exp_002
  instruction: 'Implement a thread-safe concurrent cache in F# using fine-grained locking.

    Support LRU eviction policy with configurable capacity.

    Use ReaderWriterLockSlim for concurrent access patterns.

    Include: get, put, remove, and atomic update operations.

    Write stress tests that verify thread safety under high concurrency.'
- id: general_0001_exp_003
  instruction: 'Design a multi-level cache hierarchy in F# with L1 (in-memory) and L2 (persistent) layers.

    L1 should use LRU eviction, L2 should use a simple dictionary with disk serialization.

    Include operations: get (check L1 first, then L2), put (write to both layers), and promote (move from L2 to L1).

    Write integration tests that verify data consistency across layers.'
- id: general_0001_exp_004
  instruction: 'Implement a cache with configurable eviction policies (LRU, FIFO, Random) in F# using strategy pattern.

    Use a common interface for eviction policies with pluggable implementations.

    Include: get, put, remove, change policy at runtime, and statistics tracking.

    Write property-based tests for each policy verifying their specific eviction behavior.'
- id: general_0001_exp_005
  instruction: 'Create a cache with weighted items in F# where each entry has a weight (memory cost).

    Evict items using a weighted LRU policy when total weight exceeds capacity.

    Use a Dictionary for O(1) lookups and maintain total weight and access order.

    Include: get, put with weight, remove, and current total weight operations.

    Write tests that verify weight-based eviction prioritizes lightweight frequently-used items.'
- id: general_0001_exp_006
  instruction: 'Implement a cache with background cleanup thread in F# that periodically removes stale entries.

    Support both size-based and time-based eviction policies.

    Use thread-safe collections and proper synchronization.

    Include: get, put, remove, trigger manual cleanup, and statistics operations.

    Write tests that verify background cleanup doesn''t block main operations.'
- id: general_0001_exp_007
  instruction: 'Design a cache with maximum age constraint in F# where items older than N seconds are automatically invalidated.

    Use a Dictionary for storage and a queue for age tracking.

    Include: get (return None if expired), put, remove, and cleanup expired items operations.

    Write property-based tests that verify age-based invalidation works correctly.'
- id: general_0001_exp_008
  instruction: 'Create a cache with write-through behavior in F# that automatically persists to a backing store.

    Use async workflows for non-blocking persistence operations.

    Include: get, put (write to cache and backing store), remove (from both), and flush operations.

    Write tests that verify data consistency between cache and backing store after failures.'
- id: general_0001_exp_009
  instruction: 'Implement a cache with prefetching capability in F# that predicts and loads likely-to-be-accessed items.

    Use simple access pattern tracking (like next-in-sequence prediction).

    Include: get, put, prefetch (background loading), and prediction model update operations.

    Write tests that verify prefetching improves cache hit rate for predictable access patterns.'
- id: general_0001_exp_010
  instruction: 'Design a cache with compressed values in F# to maximize memory efficiency.

    Use GZipStream or similar for compression/decompression on cache operations.

    Include: get (decompress), put (compress), remove, and compression statistics operations.

    Write performance tests comparing compressed vs uncompressed memory usage.'
- id: general_0001_exp_011
  instruction: 'Create a cache with hit/miss statistics and monitoring in F#.

    Track hit rate, eviction count, average load time, and other metrics.

    Include: get, put, remove, get statistics, and reset statistics operations.

    Write tests that verify statistics accurately reflect cache usage patterns.'
- id: general_0001_exp_012
  instruction: 'Implement a cache with atomic compare-and-swap operations in F#.

    Support atomic updates based on previous value without race conditions.

    Use optimistic concurrency with version stamps.

    Include: get, put, compareAndSwap, and remove operations.

    Write concurrent tests that verify atomicity of compare-and-swap operations.'
- id: general_0001_exp_013
  instruction: 'Design a cache with dependency tracking in F# where items can depend on other cached items.

    Automatically invalidate dependent items when a parent item changes.

    Use a graph structure to track dependencies.

    Include: get, put with dependencies, remove, and invalidate chain operations.

    Write tests that verify dependency chains are properly invalidated.'
- id: general_0001_exp_014
  instruction: 'Create a cache with spatial locality optimization in F# for geographic data.

    Evict items based on both recency and distance from frequently accessed regions.

    Include: get, put with coordinates, remove, and region-based prefetch operations.

    Write tests that simulate geographic access patterns and verify spatial optimization.'
- id: general_0001_exp_015
  instruction: 'Implement a cache with bloom filter optimization in F# to avoid expensive lookups for non-existent keys.

    Use a bloom filter to quickly check for key existence before dictionary lookup.

    Include: get, put, remove, and bloom filter statistics operations.

    Write tests that verify bloom filter reduces unnecessary dictionary lookups.'
- id: general_0001_exp_016
  instruction: 'Design a cache with adaptive capacity in F# that adjusts based on system memory pressure.

    Monitor GC memory pressure and dynamically adjust cache size.

    Include: get, put, remove, and adaptive resize operations.

    Write tests that simulate memory pressure and verify adaptive behavior.'
- id: general_0001_exp_017
  instruction: 'Create a cache with encryption for sensitive data in F#.

    Encrypt values before caching and decrypt on retrieval.

    Use AES encryption with configurable keys.

    Include: get, put, remove, and key rotation operations.

    Write tests that verify encrypted data cannot be read without proper key.'
- id: general_0001_exp_018
  instruction: 'Implement a cache with transaction support in F#.

    Support begin/commit/rollback semantics for cache operations.

    Maintain transaction logs for rollback capability.

    Include: get, put, remove, beginTransaction, commit, and rollback operations.

    Write tests that verify atomic transaction behavior across multiple operations.'
- id: general_0001_exp_019
  instruction: 'Design a cache with priority levels in F# where high-priority items are evicted last.

    Support multiple priority tiers with configurable quotas for each tier.

    Include: get, put with priority, remove, and priority quota adjustment operations.

    Write tests that verify high-priority items survive longer than low-priority ones.'
- id: general_0001_exp_020
  instruction: 'Create a cache with incremental loading in F# for partially available data.

    Support fetching missing portions of cached items on demand.

    Include: get (with partial retrieval), put, remove, and background loading operations.

    Write tests that verify partial data can be completed incrementally.'
- id: general_0001_exp_021
  instruction: 'Implement a cache with duplicate detection in F# for identical values.

    Store identical values once with reference counting to save memory.

    Include: get, put, remove, and deduplication statistics operations.

    Write tests that verify memory savings from value deduplication.'
- id: general_0001_exp_022
  instruction: 'Design a cache with access control in F# where different users have different permissions.

    Support role-based access to cached items.

    Include: get (with user context), put (with owner), remove, and permission check operations.

    Write tests that verify access control prevents unauthorized access.'
- id: general_0001_exp_023
  instruction: 'Create a cache with versioned items in F# for optimistic concurrency control.

    Each item has a version that increments on updates.

    Include: get, put (with expected version), remove, and version check operations.

    Write tests that verify version conflicts are properly detected.'
- id: general_0001_exp_024
  instruction: 'Implement a cache with cost-based eviction in F# where each item has retrieval cost.

    Evict items with highest retrieval cost when capacity is reached.

    Use a combination of Dictionary and max-heap for cost tracking.

    Include: get, put with cost, remove, and total cost operations.

    Write tests that verify high-cost items are preserved when beneficial.'
- id: general_0001_exp_025
  instruction: 'Design a cache with write-behind behavior in F# that batches updates to backing store.

    Accumulate writes and flush periodically in background.

    Include: get, put, remove, flush, and pending writes count operations.

    Write tests that verify batched writes improve performance without data loss.'
- id: general_0001_exp_026
  instruction: 'Create a cache with semantic invalidation in F# using tags or categories.

    Invalidate all items matching specific tags or categories.

    Include: get, put with tags, remove, invalidate by tag operations.

    Write tests that verify tag-based invalidation works correctly.'
- id: general_0001_exp_027
  instruction: 'Implement a cache with memory-mapped file backing in F# for large datasets.

    Use memory-mapped files for storage with in-memory index.

    Include: get, put, remove, and persistence operations.

    Write tests that verify data survives process restart.'
- id: general_0001_exp_028
  instruction: 'Design a cache with predictive loading based on Markov chains in F#.

    Analyze access patterns to predict and preload likely next items.

    Include: get, put, remove, train predictor, and predictive load operations.

    Write tests that verify prediction accuracy improves with usage.'
- id: general_0001_exp_029
  instruction: 'Create a cache with distributed consistency in F# (simulated multi-node environment).

    Support multiple cache nodes with eventual consistency using vector clocks.

    Include: get, put, remove, and synchronization operations.

    Write tests that verify convergence to consistent state across nodes.'
- id: general_0002_exp_000
  instruction: 'Implement Prim''s minimum spanning tree algorithm in F# using an immutable priority queue.

    Represent the graph as an adjacency list using F# Map with weighted edges.

    Return both the total weight of the MST and the list of edges in the spanning tree.

    Include validation to ensure the graph is connected before processing.

    Demonstrate with a weighted undirected graph example.'
- id: general_0002_exp_001
  instruction: 'Implement A* pathfinding algorithm in F# for a grid-based game map.

    Use an immutable priority queue and heuristic function (Manhattan distance).

    Represent the grid as a 2D array with walkable/unwalkable cells.

    Return the path coordinates from start to goal, or None if no path exists.

    Include diagonal movement as an optional parameter with appropriate cost.'
- id: general_0002_exp_002
  instruction: 'Implement topological sort for a directed acyclic graph in F# using Kahn''s algorithm.

    Represent the graph as an adjacency list using F# Map with node dependencies.

    Handle cyclic graph detection and return an error if a cycle is found.

    Return the linear ordering of nodes that satisfies all dependencies.

    Demonstrate with a task scheduling system example.'
- id: general_0002_exp_003
  instruction: 'Implement Bellman-Ford algorithm in F# for graphs with negative weight edges.

    Use an immutable data structure to track distances and predecessor nodes.

    Include cycle detection for negative-weight cycles and return appropriate error.

    Handle both directed and undirected graphs with configuration parameter.

    Demonstrate with a currency arbitrage detection example.'
- id: general_0002_exp_004
  instruction: 'Implement Floyd-Warshall algorithm in F# for all-pairs shortest paths.

    Use an immutable 2D array representation for the distance matrix.

    Include path reconstruction to get the actual shortest path between any two nodes.

    Optimize memory usage by implementing the space-optimized version.

    Demonstrate with a small transportation network.'
- id: general_0002_exp_005
  instruction: 'Implement Kruskal''s minimum spanning tree algorithm in F# using union-find data structure.

    Represent the graph as a sorted edge list rather than adjacency list.

    Make the union-find data structure fully immutable with path compression.

    Return the MST edges sorted by weight and total cost.

    Include handling for disconnected graphs (return forest of MSTs).'
- id: general_0002_exp_006
  instruction: 'Implement breadth-first search (BFS) in F# for social network friend recommendations.

    Use an immutable queue and track visited nodes with a Set.

    Find all users within N degrees of separation from a starting user.

    Return the users grouped by distance/degree from the source.

    Include optional filtering by user attributes (age, location, interests).'
- id: general_0002_exp_007
  instruction: 'Implement depth-first search (DFS) in F# for dependency resolution in package management.

    Use recursion with tail-call optimization where possible.

    Detect circular dependencies and return appropriate error messages.

    Return the installation order that satisfies all dependencies.

    Handle version constraints and optional dependencies.'
- id: general_0002_exp_008
  instruction: 'Implement Johnson''s algorithm in F# for sparse graphs with negative weights.

    Use Bellman-Ford for reweighting and then Dijkstra for all pairs.

    Maintain immutability throughout all graph transformations.

    Return the all-pairs shortest paths matrix and predecessor matrix.

    Include performance comparison with Floyd-Warshall for different graph densities.'
- id: general_0002_exp_009
  instruction: 'Implement Yen''s algorithm in F# for finding K shortest paths between two nodes.

    Use Dijkstra''s algorithm as a subroutine with an immutable priority queue.

    Handle cases where fewer than K paths exist between nodes.

    Return the list of paths sorted by total distance.

    Include a timeout mechanism for large K values.'
- id: general_0002_exp_010
  instruction: 'Implement bidirectional Dijkstra algorithm in F# for faster shortest path queries.

    Use two priority queues (forward and backward search) that meet in the middle.

    Implement efficient termination condition when searches overlap.

    Return the shortest path and total distance, optimizing for large graphs.

    Include benchmarking against standard Dijkstra implementation.'
- id: general_0002_exp_011
  instruction: 'Implement contraction hierarchies in F# for fast shortest path queries in road networks.

    Preprocess the graph by contracting vertices in order of importance.

    Store shortcuts and original edges in an immutable data structure.

    Implement query algorithm that only explores important vertices.

    Demonstrate with a small road network and compare query times.'
- id: general_0002_exp_012
  instruction: 'Implement Tarjan''s strongly connected components algorithm in F#.

    Use recursion with immutable stack simulation for tracking lowlinks.

    Return the list of strongly connected components in the graph.

    Include visualization of component relationships as a DAG condensation.

    Demonstrate with a web page link analysis example.'
- id: general_0002_exp_013
  instruction: 'Implement Hungarian algorithm in F# for solving assignment problems.

    Represent the cost matrix as an immutable 2D array.

    Handle rectangular matrices (more workers than jobs) with dummy entries.

    Return the optimal assignment and total minimum cost.

    Include validation for non-negative costs.'
- id: general_0002_exp_014
  instruction: 'Implement Ford-Fulkerson algorithm with Edmonds-Karp variation in F# for maximum flow.

    Represent the flow network as adjacency list with capacity and flow information.

    Use BFS to find augmenting paths in the residual graph.

    Return the maximum flow value and the flow across each edge.

    Demonstrate with a network reliability analysis example.'
- id: general_0002_exp_015
  instruction: 'Implement Kosaraju''s algorithm in F# for finding strongly connected components.

    Use two passes of DFS with immutable visited sets and result accumulators.

    Return the SCCs in topological order of the component graph.

    Include memory-efficient representation for large graphs using iterative DFS.

    Demonstrate with a compiler call graph analysis.'
- id: general_0002_exp_016
  instruction: 'Implement Dijkstra''s algorithm in F# for multi-criteria optimization (Pareto-optimal paths).

    Extend the priority queue to handle vector-valued costs (time, cost, distance).

    Return the set of Pareto-optimal paths from source to destination.

    Include dominance checking function for efficient pruning.

    Demonstrate with a travel planning system considering both time and expense.'
- id: general_0002_exp_017
  instruction: 'Implement iterative deepening depth-first search (IDDFS) in F# for puzzle solving.

    Use recursion with increasing depth limits to find optimal solutions.

    Represent puzzle state as an immutable data structure with equality comparison.

    Return the solution path and number of nodes explored at each depth.

    Demonstrate with a sliding tile puzzle (8-puzzle).'
- id: general_0002_exp_018
  instruction: 'Implement ant colony optimization in F# for traveling salesman problem.

    Use immutable data structures for pheromone trails and ant paths.

    Include evaporation rate and pheromone update rules as parameters.

    Return the best tour found and convergence statistics.

    Visualize the pheromone distribution evolution over iterations.'
- id: general_0002_exp_019
  instruction: 'Implement simplex algorithm in F# for linear programming problems.

    Represent the tableau as an immutable 2D array with rational numbers.

    Handle both maximization and minimization problems.

    Include detection of unbounded and infeasible problems.

    Return the optimal solution and objective value.'
- id: general_0002_exp_020
  instruction: 'Implement branch and bound algorithm in F# for 0/1 knapsack problem.

    Use priority queue for best-first search through solution space.

    Implement efficient bounding function using fractional knapsack relaxation.

    Return the optimal selection of items and total value.

    Include memoization for overlapping subproblems.'
- id: general_0002_exp_021
  instruction: 'Implement Dijkstra''s algorithm in F# with time-dependent edge weights.

    Edge traversal times vary based on departure time (modeling traffic patterns).

    Use priority queue where priority includes both distance and time.

    Return the shortest-time path and arrival time at each node.

    Demonstrate with a public transportation schedule.'
- id: general_0002_exp_022
  instruction: 'Implement bidirectional A* search in F# for real-time strategy game pathfinding.

    Use consistent heuristics to guarantee optimality in bidirectional search.

    Handle dynamic obstacles by replanning from meeting point.

    Return the path and total computation time for performance comparison.

    Include visualization of forward/backward search frontiers.'
- id: general_0002_exp_023
  instruction: 'Implement Christofides algorithm in F# for approximating TSP in metric spaces.

    Find minimum spanning tree, perfect matching on odd-degree vertices, and Eulerian tour.

    Ensure all steps use immutable data structures where possible.

    Return the approximate tour and its cost compared to lower bound.

    Demonstrate with Euclidean TSP instance.'
- id: general_0002_exp_024
  instruction: 'Implement push-relabel algorithm in F# for maximum flow with gap heuristic.

    Use immutable data structures for height and excess flow at nodes.

    Handle both directed and undirected flow networks.

    Return the maximum flow value and execution time statistics.

    Compare performance with Edmonds-Karp on dense networks.'
- id: general_0002_exp_025
  instruction: 'Implement Dijkstra''s algorithm in F# for graphs with turn restrictions (road networks).

    Model intersections as nodes and road segments as edges with turn penalties.

    Use expanded graph representation or state-enhanced Dijkstra.

    Return the shortest path respecting turn restrictions.

    Include handling for prohibited turns and U-turns.'
- id: general_0002_exp_026
  instruction: 'Implement Hopcroft-Karp algorithm in F# for maximum bipartite matching.

    Use BFS for layered graph construction and DFS for augmenting paths.

    Represent bipartite graph as two sets of vertices with edges between.

    Return the maximum matching and whether it''s a perfect matching.

    Demonstrate with job assignment problem.'
- id: general_0002_exp_027
  instruction: 'Implement hierarchical pathfinding in F# for large game worlds.

    Divide map into clusters and precompute intra-cluster and border distances.

    Use two-level search: high-level (cluster graph) and low-level (within clusters).

    Return the path with option for smoothing to remove unnecessary waypoints.

    Compare quality and speed with standard A*.'
- id: general_0002_exp_028
  instruction: 'Implement minimum cost maximum flow algorithm in F#.

    Extend Ford-Fulkerson to handle edge costs in addition to capacities.

    Use successive shortest path algorithm with potential functions.

    Return the maximum flow achieved and its total cost.

    Demonstrate with supply chain logistics example.'
- id: general_0002_exp_029
  instruction: 'Implement Dijkstra''s algorithm in F# for multi-modal transportation networks.

    Handle transfers between different modes (walk, bus, train) with transfer penalties.

    Use time-expanded graph or state-enhanced search with mode as state component.

    Return the journey with mode changes and total travel time.

    Include real-time schedule considerations.'
- id: general_0003_exp_000
  instruction: 'Implement a JSON parser combinator library in F# from scratch.

    Include: pnull, pbool, pnumber, pstring, parray, pobject.

    Use the signature Parser<''T> = string -> Result<''T * string, string>.

    Support parsing nested objects and arrays, and demonstrate by parsing a sample JSON with at least 3 levels of nesting.'
- id: general_0003_exp_001
  instruction: 'Create a CSV parser combinator library in F# that handles quoted fields, escaped quotes, and optional headers.

    Include: pfield, prow, pheader, pmanyRows.

    Use the signature Parser<''T> = string -> Result<''T * string, string>.

    Demonstrate parsing a CSV with mixed data types and missing values, converting rows to a list of records.'
- id: general_0003_exp_002
  instruction: 'Build a parser combinator library in F# for parsing HTTP request headers.

    Include: pMethod, pPath, pHeaderLine, pVersion, pmanyHeaders.

    Use the signature Parser<''T> = string -> Result<''T * string, string>.

    Handle case-insensitive header names and validate that required headers like Host are present.'
- id: general_0003_exp_003
  instruction: 'Design a parser combinator library in F# for a custom configuration file format supporting key-value pairs,
    sections, and comments.

    Include: pKeyValue, pSection, pComment, pWhitespace, pmanyConfigItems.

    Use the signature Parser<''T> = string -> Result<''T * string, string>.

    Demonstrate by parsing a config file with multiple sections and nested properties.'
- id: general_0003_exp_004
  instruction: 'Write a parser combinator library in F# for parsing SQL WHERE clause conditions.

    Include: pIdentifier, pOperator, pValue, pCondition, pAndOr, pmanyConditions.

    Use the signature Parser<''T> = string -> Result<''T * string, string>.

    Support parentheses for grouping and operators like =, <>, >, <, LIKE, IN.

    Demonstrate by parsing a complex condition with nested AND/OR logic.'
- id: general_0003_exp_005
  instruction: 'Implement a parser combinator library in F# for parsing IPv4 and IPv6 addresses.

    Include: pIPv4, pIPv6, pPort, pAddressWithPort.

    Use the signature Parser<''T> = string -> Result<''T * string, string>.

    Validate address ranges and handle optional port numbers. Demonstrate by parsing a list of addresses from a string.'
- id: general_0003_exp_006
  instruction: 'Create a parser combinator library in F# for parsing log entries in Common Log Format (CLF).

    Include: pRemoteHost, pDateTime, pRequest, pStatusCode, pBytes.

    Use the signature Parser<''T> = string -> Result<''T * string, string>.

    Handle missing fields (e.g., bytes may be ''-'') and demonstrate parsing a multi-line log file.'
- id: general_0003_exp_007
  instruction: 'Build a parser combinator library in F# for parsing mathematical expressions with variables and functions.

    Include: pVariable, pFunctionCall, pNumber, pOperator, pExpression.

    Use the signature Parser<''T> = string -> Result<''T * string, string>.

    Support functions like sin, cos, log and operator precedence. Demonstrate by parsing "sin(x) + cos(y) * 2".'
- id: general_0003_exp_008
  instruction: 'Design a parser combinator library in F# for parsing XML tags and content.

    Include: pOpenTag, pCloseTag, pContent, pAttribute, pElement.

    Use the signature Parser<''T> = string -> Result<''T * string, string>.

    Handle self-closing tags and nested elements. Demonstrate by parsing a simple XML fragment.'
- id: general_0003_exp_009
  instruction: 'Write a parser combinator library in F# for parsing email addresses according to RFC 5322.

    Include: pLocalPart, pDomain, pSubdomain, pEmail.

    Use the signature Parser<''T> = string -> Result<''T * string, string>.

    Handle quoted strings and comments in addresses. Demonstrate by parsing a list of emails separated by semicolons.'
- id: general_0003_exp_010
  instruction: 'Implement a parser combinator library in F# for parsing ISO 8601 date-time strings.

    Include: pDate, pTime, pTimezone, pDateTime.

    Use the signature Parser<''T> = string -> Result<''T * string, string>.

    Support various formats (basic and extended) with optional timezone. Demonstrate by parsing "2023-12-25T15:30:00Z".'
- id: general_0003_exp_011
  instruction: 'Create a parser combinator library in F# for parsing a subset of GraphQL query language.

    Include: pField, pArgument, pSelectionSet, pOperation.

    Use the signature Parser<''T> = string -> Result<''T * string, string>.

    Handle nested queries and arguments. Demonstrate by parsing a query with multiple nested fields.'
- id: general_0003_exp_012
  instruction: 'Build a parser combinator library in F# for parsing hexadecimal color codes (CSS style).

    Include: pHexDigit, pRGB, pRGBA, pShortRGB.

    Use the signature Parser<''T> = string -> Result<''T * string, string>.

    Support both 3-digit and 6-digit hex codes with optional alpha channel. Demonstrate by parsing a list of colors.'
- id: general_0003_exp_013
  instruction: 'Design a parser combinator library in F# for parsing INI configuration files.

    Include: pSection, pKeyValue, pComment, pEmptyLine, pmanyIniItems.

    Use the signature Parser<''T> = string -> Result<''T * string, string>.

    Handle duplicate sections and keys (last wins). Demonstrate by parsing an INI file with multiple sections.'
- id: general_0003_exp_014
  instruction: 'Write a parser combinator library in F# for parsing URL query strings.

    Include: pQueryParam, pParamValue, pParamList, pFragment.

    Use the signature Parser<''T> = string -> Result<''T * string, string>.

    Handle URL-encoded values and multiple parameters. Demonstrate by parsing "?key1=value1&key2=value2#fragment".'
- id: general_0003_exp_015
  instruction: 'Implement a parser combinator library in F# for parsing a simple programming language with assignments and
    arithmetic.

    Include: pAssignment, pIdentifier, pExpression, pStatement, pmanyStatements.

    Use the signature Parser<''T> = string -> Result<''T * string, string>.

    Support variable assignments and basic arithmetic. Demonstrate by parsing "x = 5; y = x + 3;".'
- id: general_0003_exp_016
  instruction: 'Create a parser combinator library in F# for parsing Markdown headings and lists.

    Include: pHeading, pListItem, pOrderedList, pUnorderedList.

    Use the signature Parser<''T> = string -> Result<''T * string, string>.

    Handle nested lists and multiple heading levels. Demonstrate by parsing a document with headings and a nested list.'
- id: general_0003_exp_017
  instruction: 'Build a parser combinator library in F# for parsing Windows-style file paths.

    Include: pDriveLetter, pFolder, pFilename, pExtension, pPath.

    Use the signature Parser<''T> = string -> Result<''T * string, string>.

    Handle both absolute and relative paths. Demonstrate by parsing "C:\Users\John\file.txt" and "..\relative\file.doc".'
- id: general_0003_exp_018
  instruction: 'Design a parser combinator library in F# for parsing credit card numbers with validation.

    Include: pCardNumber, pExpiryDate, pCVV, pCardType.

    Use the signature Parser<''T> = string -> Result<''T * string, string>.

    Validate Luhn algorithm and card type prefixes. Demonstrate by parsing "4111-1111-1111-1111 12/25 123".'
- id: general_0003_exp_019
  instruction: 'Write a parser combinator library in F# for parsing a custom binary protocol header.

    Include: pMagicNumber, pVersion, pPayloadLength, pChecksum, pHeader.

    Use the signature Parser<''T> = string -> Result<''T * string, string>.

    Assume input is a hex string. Validate checksum. Demonstrate by parsing "DEADBEEF0100000C12345678".'
- id: general_0003_exp_020
  instruction: 'Implement a parser combinator library in F# for parsing boolean expressions.

    Include: pBool, pNot, pAnd, pOr, pParenthesized.

    Use the signature Parser<''T> = string -> Result<''T * string, string>.

    Support operator precedence and parentheses. Demonstrate by parsing "true AND (false OR true)".'
- id: general_0003_exp_021
  instruction: 'Create a parser combinator library in F# for parsing a subset of YAML key-value pairs and lists.

    Include: pYAMLKey, pYAMLValue, pListElement, pIndentation.

    Use the signature Parser<''T> = string -> Result<''T * string, string>.

    Handle indentation for nesting. Demonstrate by parsing a simple YAML with a list and nested mapping.'
- id: general_0003_exp_022
  instruction: 'Build a parser combinator library in F# for parsing YYYY-MM-DD dates with validation.

    Include: pYear, pMonth, pDay, pDate.

    Use the signature Parser<''T> = string -> Result<''T * string, string>.

    Validate leap years and month/day ranges. Demonstrate by parsing "2023-02-29" (invalid) and "2024-02-29" (valid).'
- id: general_0003_exp_023
