  instruction: Implement an IoT sensor data aggregation system using Akka.NET actors in F#. Create actors for sensor simulation,
    data validation, and aggregation. Use discriminated unions for message types (e.g., SensorReading, ValidationResult, AggregatedData).
    Implement a supervisor actor that uses a OneForOne strategy with exponential backoff to handle validation failures. Include
    message passing with tell (!) and ask (?) patterns, and demonstrate how aggregated data is forwarded to a monitoring actor.
- id: fsharp_lib_0007_exp_001
  instruction: Design a distributed task scheduler in F# with Akka.NET where parent actors distribute work to child worker
    actors. Define message types for TaskRequest, TaskResult, and WorkerStatus. Use `spawn` with `actorOf2` to create worker
    pools. Implement supervision with Resume directive for non-fatal errors and Escalate for critical failures. Show load
    balancing across workers and include a demonstration of asking for task completion status with timeout handling.
- id: fsharp_lib_0007_exp_002
  instruction: Create a real-time trading engine simulation using Akka.NET in F#. Define message unions for Order, TradeExecution,
    and MarketData. Implement a parent order book actor that spawns child actors for different trading pairs. Use the ask
    pattern for price inquiries and tell for order placement. Add a supervision strategy that restarts child actors on arithmetic
    exceptions but stops them on invalid order format errors. Include circuit breaker pattern for market data feed failures.
- id: fsharp_lib_0007_exp_003
  instruction: Build a social media notification system in F# with Akka.NET actors. Create message types for UserNotification,
    DeliveryStatus, and BatchSend. Implement a parent notification coordinator that spawns child actors for different delivery
    channels (email, SMS, push). Use `actorOf2` for channel actors with backpressure support. Demonstrate supervision with
    custom directives for rate limit errors. Show message forwarding between actors and include a dead letter logging mechanism.
- id: fsharp_lib_0007_exp_004
  instruction: Implement a healthcare patient monitoring system using Akka.NET in F#. Define discriminated unions for PatientVitals,
    Alert, and PhysicianNotification. Create a supervisor actor that manages vital processors with a OneForOne strategy restarting
    on transient sensor errors. Use the ask pattern for critical alert confirmation and tell for routine updates. Include
    actor hierarchy with device proxies and demonstrate message flow with error recovery scenarios.
- id: fsharp_lib_0007_exp_005
  instruction: Design a banking transaction processor in F# with Akka.NET actors. Create message types for Transaction, Authorization,
    and AuditLog. Implement parent account actors that spawn child transaction handlers. Use `spawn` with custom names for
    actor paths. Add supervision that escalates fraud detection failures to a security actor. Demonstrate distributed consensus
    using the ask pattern with multiple validators and include idempotency handling for duplicate transactions.
- id: fsharp_lib_0007_exp_006
  instruction: Create a multiplayer game server backend using Akka.NET actors in F#. Define message unions for PlayerAction,
    GameStateUpdate, and ChatMessage. Implement a parent game room actor that spawns child player session actors. Use `actorOf2`
    with mailbox processors for each player. Add supervision that restarts crashed player sessions but stops malicious actors.
    Demonstrate real-time message broadcasting and include lag compensation logic in message handling.
- id: fsharp_lib_0007_exp_007
  instruction: Build a document processing pipeline in F# with Akka.NET. Define message types for DocumentChunk, ProcessingResult,
    and PipelineError. Create parent coordinator actors that spawn child actors for extraction, transformation, and loading
    stages. Implement supervision with backoff strategy for resource exhaustion. Use the ask pattern for pipeline status queries
    and demonstrate parallel processing with result aggregation. Include poison pill handling for graceful shutdown.
- id: fsharp_lib_0007_exp_008
  instruction: Implement a smart home automation system using Akka.NET actors in F#. Create message unions for DeviceCommand,
    SensorEvent, and RoutineTrigger. Design a parent home controller with child actors for different rooms. Use `spawn` with
    router configurations for device groups. Add supervision that restarts device proxies on connection loss. Demonstrate
    scheduled message passing and include conflict resolution for overlapping automation rules.
- id: fsharp_lib_0007_exp_009
  instruction: Design a microservice orchestration system in F# with Akka.NET. Define message types for ServiceRequest, DependencyResponse,
    and CircuitBreakerState. Implement parent orchestrator actors that spawn child service proxies. Use the ask pattern with
