  instruction: 'Implement a real-time IoT sensor data processing pipeline using FSharp.Control.AsyncSeq:

    1. Read sensor events from an MQTT broker as an async sequence

    2. Validate each event has required fields (deviceId, timestamp, reading) using AsyncSeq.choose

    3. Normalize readings to standard units with AsyncSeq.mapAsync

    4. Aggregate readings by device using AsyncSeq.groupBy with a 5-second window

    5. Calculate statistics (min, max, avg) for each device group

    6. Store aggregated results in a time-series database using AsyncSeq.iterAsync

    7. Handle malformed JSON and connection drops gracefully without stopping the pipeline

    Include backpressure handling when database writes are slow.'
- id: fsharp_lib_0021_exp_001
  instruction: 'Create a social media sentiment analysis pipeline using FSharp.Control.AsyncSeq:

    1. Stream tweets from Twitter API as an async sequence

    2. Filter for English language tweets using AsyncSeq.filter

    3. Perform sentiment analysis on each tweet (positive/negative/neutral) with AsyncSeq.mapAsync

    4. Batch tweets by sentiment category using AsyncSeq.bufferByCountAndTime

    5. Store sentiment batches in Redis for real-time dashboard updates

    6. Track processing metrics (tweets per minute, sentiment distribution) with AsyncSeq.scan

    7. Handle API rate limiting by implementing exponential backoff retry logic'
