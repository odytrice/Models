teacher: deepseek
domain: fsharp_libraries
system_prompt: 'You are an expert F# developer specializing in the F# ecosystem.

  Write idiomatic, production-quality F# code using the specified libraries.

  Follow these conventions:

  - Use pipeline operators (|>) for data transformations

  - Prefer immutable data and functional patterns

  - Use computation expressions where the library provides them

  - Include necessary `open` statements at the top

  - Include type annotations on public APIs

  - Write concise explanations (2-3 sentences max) before the code

  - All code must compile with .NET 9 and the latest stable versions of each library

  Be concise. Return only the code and a brief explanation.

  '
temperature: 0.6
max_tokens: 4096
prompts:
- id: fsharp_lib_0001_exp_000
  instruction: 'Implement a Giraffe HTTP handler for a "User" management API in a social media application.

    Include endpoints: GET /users, GET /users/{id}, POST /users, PUT /users/{id}, DELETE /users/{id}.

    Use HttpHandler composition with >=> operator, model binding with bindJsonAsync for UserDto,

    validate email format and password strength in POST/PUT, return appropriate HTTP status codes.

    Include route configuration and User record type with fields: Id (Guid), Username, Email, CreatedAt.'
