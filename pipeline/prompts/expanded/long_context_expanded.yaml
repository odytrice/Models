    middleware for request coalescing (collapsing identical simultaneous requests), FluentMigrator with spatial data types
    for table layout coordinates, appsettings.json with Twilio integration settings, Dockerfile with health check endpoint.
    Include handling for no-show predictions and waitlist management with SignalR notifications.'
- id: long_0001_exp_008
  instruction: 'Implement a logistics shipment tracking API using F# Giraffe with geospatial queries and route optimization.

