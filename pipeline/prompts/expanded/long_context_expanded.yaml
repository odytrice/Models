teacher: kimi
domain: long_context
system_prompt: 'You are a senior full-stack developer writing comprehensive, production-quality code.

  Your responses should be thorough and detailed -- include ALL files needed for a complete implementation.

  For each file, include the full path as a comment and the complete implementation (not truncated).

  Use this stack:

  - Backend: F# with Giraffe, FsToolkit.ErrorHandling, ASP.NET Core

  - Frontend: Svelte 5 with runes, SvelteKit 2, TypeScript

  - Data: PostgreSQL, linq2db or Npgsql

  - Infrastructure: Docker, docker-compose

  Include: type definitions, error handling, validation, logging, and configuration.

  Do NOT abbreviate or use "..." -- write the complete code for every file.

  '
temperature: 0.7
max_tokens: 16384
prompts:
- id: long_0001_exp_000
  instruction: 'Build a complete F# Giraffe REST API for an e-commerce order management system handling inventory allocation
    and payment processing.

    Include: Domain types (Order, OrderLine, Payment, Inventory DUs with units of measure), Data access with linq2db implementing
    optimistic concurrency for inventory updates, Service layer with saga pattern for distributed transactions using FsToolkit.ErrorHandling
    taskResult CEs, HTTP handlers with idempotency key middleware, JWT authentication with role-based access (Customer, Admin,
    Warehouse), Route configuration with API versioning (/v1/orders), Program.fs with Polly retry policies and custom Serilog
    enrichment, FluentMigrator migrations with foreign key constraints and indexes on OrderStatus, appsettings.json with connection
    string vault integration, Dockerfile with Alpine Linux base and health checks. Include specific handling for out-of-stock
    scenarios and partial fulfillment logic.'
- id: long_0001_exp_001
  instruction: 'Design a HIPAA-compliant healthcare patient records API using F# Giraffe with audit logging and field-level
    encryption.

    Include: Domain types (Patient, MedicalRecord, Encounter with PHI markers), Data access implementing repository pattern
    with encrypted columns using AEAD, Service layer with Result-based validation for medical codes (ICD-10, CPT), HTTP handlers
    with content-security headers and CORS restrictions, Authentication middleware integrating with Azure AD B2C, Route configuration
    with patient consent filtering middleware, Program.fs with request/response encryption middleware, FluentMigrator with
    audit trigger setup, appsettings.json with certificate-based encryption keys, Dockerfile with non-root user and read-only
    filesystem. Ensure all endpoints implement the Safe Redirection pattern and include middleware for logging access to sensitive
    records.'
- id: long_0001_exp_002
  instruction: 'Refactor an existing poorly-structured F# Giraffe monolithic web application into a clean architecture with
    proper separation of concerns.

    The current codebase has HttpHandlers directly calling database contexts with inline SQL. Transform this into: Domain
    layer with pure functions (PaymentCalculation, DiscountEngine), Infrastructure layer with linq2db repositories implementing
    unit of work pattern, Application layer with MediatR-style handlers using FsToolkit.ErrorHandling for validation pipelines,
    Web layer with thin Giraffe handlers only doing HTTP concern mapping. Add middleware for global exception handling using
    Giraffe''s error handler combinators, implement response caching for product catalog endpoints, and configure structured
    logging with correlation IDs across async boundaries. Include before/after comparison of the HttpHandler composition patterns.'
- id: long_0001_exp_003
  instruction: 'Debug and fix a production F# Giraffe API experiencing memory leaks under high concurrent load during file
    upload processing.

    The application crashes with OutOfMemoryException when handling 100+ concurrent 50MB file uploads. Analyze the streaming
    implementation: current code loads entire files into byte arrays. Provide corrected implementation using Giraffe''s streaming
    APIs with proper HttpContext.Request.Body pipelining, implement backpressure handling with Channel<T> for async processing
    queues, add memory pooling with ArrayPool<byte>, configure Kestrel limits in Program.fs (MaxRequestBodySize, MultipartBodyLengthLimit),
    and implement request limitation middleware with cancellation token propagation. Include performance benchmarks comparing
    memory usage before and after fixes.'
- id: long_0001_exp_004
  instruction: 'Implement a real-time IoT telemetry ingestion API using F# Giraffe with WebSocket support and time-series
    data handling.

    Include: Domain types (Device, TelemetryReading with discriminated unions for sensor types), Data access optimized for
    high-write throughput with linq2db bulk inserts and table-valued parameters, Service layer with sliding window aggregation
    for anomaly detection using FsToolkit.ErrorHandling, HTTP handlers for device registration and telemetry ingestion, Giraffe
    WebSocket handlers for real-time dashboard updates, Authentication using X.509 certificate validation for devices, Rate
    limiting middleware using AspNetCoreRateLimit with custom policies per device tier, Program.fs with Kestrel configured
    for HTTP/2 and Unix socket binding, FluentMigrator with hypertable creation for TimescaleDB, appsettings.json with connection
    pooling tuned for 1000+ concurrent connections, Dockerfile with multi-stage build including native dependencies for compression.'
- id: long_0001_exp_005
  instruction: 'Create a content moderation API for a social media platform using F# Giraffe with async media processing pipelines.

    Include: Domain types (ContentItem, ModerationStatus, Report DUs), Data access with linq2db storing file metadata separately
    from blob storage (Azure Blob), Service layer with TaskResult CEs chaining virus scanning, image recognition, and text
    analysis services, HTTP handlers supporting multipart/form-data with streaming file uploads using IFormFile abstraction,
    Background service integration using IHostedService for async processing queues, Authentication with OAuth2 introspection
    endpoint validation, Route configuration with content negotiation (JSON vs MessagePack), Program.fs with custom Giraffe
    middleware for request timing metrics, FluentMigrator with JSONB columns for flexible metadata, appsettings.json with
    Azure Storage SAS token configuration, Dockerfile with ImageMagick and FFmpeg for media processing. Handle edge cases
    like zero-byte files and unsupported codecs.'
- id: long_0001_exp_006
  instruction: 'Design a microservices API gateway using F# Giraffe with YARP (Yet Another Reverse Proxy) integration for
    a fintech payment ecosystem.

    Focus on: HttpHandler composition for routing to downstream services (PaymentService, FraudService, NotificationService),
    Circuit breaker pattern implementation using Polly wrapped in custom HttpHandlers, Request aggregation pattern combining
    responses from multiple services, Authentication middleware validating JWTs and forwarding claims headers, Rate limiting
    with Redis backplane for distributed counting, Correlation ID propagation across service boundaries using HttpClientFactory
    with custom delegating handlers, Response caching with cache invalidation webhooks, Program.fs with detailed OpenTelemetry
    configuration for distributed tracing, Dockerfile with distroless base image. Include specific handling for idempotent
    payment requests and webhook signature verification.'
- id: long_0001_exp_007
  instruction: 'Build a restaurant reservation system API using F# Giraffe with concurrent booking prevention and table optimization
