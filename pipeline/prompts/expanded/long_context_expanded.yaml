    HttpHandler updates to propagate CancellationToken through the pipeline, Database connection pooling optimization in appsettings.json,
    Program.fs with async middleware configuration, BenchmarkDotNet comparison showing request latency before/after, Handling
    of async exceptions in Giraffe''s error handling middleware, Circuit breaker implementation for external HR system APIs.
    Include specific patterns for transaction scope async flow.'
- id: long_0001_exp_016
  instruction: 'Implement a legal case management API using F# Giraffe with document versioning and workflow state machines.

