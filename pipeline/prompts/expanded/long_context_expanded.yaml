- id: long_0001_exp_014
  instruction: 'Create a gaming leaderboard API using F# Giraffe with Redis caching and anti-cheat validation.

    Include: Domain types (Player, ScoreEntry, Leaderboard, AntiCheatReport), Data access with linq2db for persistence and
