- id: long_0003_exp_000
  instruction: "Refactor a monolithic F# Giraffe healthcare API that exposes patient PHI (Protected Health Information) \n\
    in plaintext, lacks audit trails, and stores data without encryption. Transform it into a HIPAA-compliant \nsystem using\
    \ domain-driven design with separate projects for Domain, Application, Infrastructure, and API. \nImplement field-level\
    \ encryption for SSNs and medical record numbers, comprehensive audit logging for all \ndata access, role-based authorization\
    \ (RBAC) for doctors/nurses/administrators, and secure file upload \nhandling for medical images. Ensure immutable audit\
    \ logs using append-only storage."
- id: long_0003_exp_001
  instruction: "Design and implement a PCI-DSS compliant payment processing API in F# Giraffe that handles credit card \n\
    transactions using the Saga pattern for distributed consistency. The system must support idempotent \npayment requests,\
    \ implement tokenization (never storing raw card data), integrate with a mock payment \ngateway using circuit breakers\
    \ for resilience, and maintain a complete audit trail of all financial \ntransactions. Include webhook support for asynchronous\
    \ payment confirmations and implement 3D Secure \nauthentication flows."
- id: long_0003_exp_002
  instruction: "Build a high-throughput IoT telemetry ingestion service in F# Giraffe capable of handling 10,000+ \ndevice\
    \ messages per second. Use IAsyncEnumerable for streaming processing, implement backpressure \nhandling when downstream\
    \ systems are slow, validate device authenticity using X.509 certificate \nauthentication, and store time-series data\
    \ in TimescaleDB. Include support for device shadow state \nmanagement, over-the-air (OTA) update distribution, and geofencing\
    \ alerts for asset tracking."
- id: long_0003_exp_003
  instruction: "Create a distributed e-commerce shopping cart service in F# Giraffe using Redis for session state \nand inventory\
    \ reservation. Implement the reservation pattern to hold inventory during checkout, \nhandle distributed conflicts using\
    \ optimistic concurrency with ETags, support cart abandonment \nrecovery via scheduled background tasks, and integrate\
