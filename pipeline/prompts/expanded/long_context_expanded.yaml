    authorizeByPolicy) usage, Clock skew issues with JWT exp/nbf claims, Authority/MetadataAddress configuration for OIDC
    discovery, Role claim mapping from JWT to ClaimsPrincipal. Provide corrected implementation with proper middleware ordering
    (Authentication before Authorization before Giraffe), Custom IClaimsTransformation for role normalization, and test cases
    using Microsoft.AspNetCore.TestHost.'
- id: long_0001_exp_022
  instruction: 'Build a cryptocurrency wallet API using F# Giraffe with cold storage simulation and transaction signing.

