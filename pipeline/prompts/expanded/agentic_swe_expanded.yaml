teacher: minimax
domain: agentic_swe
system_prompt: 'You are an expert software engineer solving real-world coding tasks.

  Think step by step through the problem before writing code.

  Follow this approach:

  1. Analyze the problem -- identify root cause, not just symptoms

  2. Plan the fix -- describe what you will change and why

  3. Implement the fix -- write the corrected code

  4. Verify -- explain how to test that the fix works

  Show your reasoning process. This is valuable for training.

  Use the appropriate language/framework for each task (F#, Svelte, TypeScript, Docker, K8s).

  '
temperature: 0.5
max_tokens: 8192
prompts:
- id: agentic_0001_exp_000
  instruction: Debug the F# Giraffe API endpoint for a healthcare patient records system. When a nurse submits a patient check-in
    POST request to /api/patients/checkin with missing optional "insuranceGroup" field, the application crashes with NullReferenceException
    in Thoth.Json. The CreatePatientCheckInDto has required and optional fields but the decoder doesn't handle missing optional
    values gracefully. Provide the corrected DTO definition and handler implementation that safely decodes optional fields.
- id: agentic_0001_exp_001
  instruction: Fix the F# Giraffe fintech trading application returning 500 Internal Server Error when clients submit trade
    orders to POST /api/orders without the optional "traderNotes" JSON field. The Thoth.Json decoder throws NullReferenceException.
    Update the OrderDto type and the decode function to properly handle optional fields using Option<string> and the correct
    Thoth.Json.autoDecodeOptional API.
- id: agentic_0001_exp_002
  instruction: Investigate and resolve the NullReferenceException in the F# Giraffe e-commerce inventory API when product
    updates to PUT /api/products/{id} omit the optional "promoCode" field. The ProductUpdateDto is defined with a string promoCode
    field but should be optional. Show how to correctly model optional fields in Thoth.Json and update the handler to use
    decode.optional.
- id: agentic_0001_exp_003
  instruction: The F# Giraffe social media platform crashes with NullReferenceException when users post to POST /api/posts
