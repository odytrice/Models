- id: svelte_ts_0007_exp_021
  instruction: Design a comprehensive error handling system for SvelteKit API routes using ReturnType to extract the error
    shapes from various third-party SDKs (Stripe, SendGrid, AWS), then unify them into a discriminated union using Extract
