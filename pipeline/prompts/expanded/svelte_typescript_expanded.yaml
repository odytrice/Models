- id: svelte_ts_0007_exp_020
  instruction: Create a type-safe GraphQL fragment system in SvelteKit where you use Pick to select specific fields from generated
    GraphQL types for different page components. Implement Exclude to remove deprecated fields from the TypeScript interfaces
