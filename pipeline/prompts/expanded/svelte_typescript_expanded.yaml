- id: svelte_ts_0007_exp_013
  instruction: Build a type-safe caching layer for SvelteKit API routes using ReturnType to infer the exact shape of database
    query results, then wrap them in a CacheEntry type with metadata timestamps. Use Partial for cache invalidation strategies
