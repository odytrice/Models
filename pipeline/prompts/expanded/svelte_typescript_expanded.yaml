    schema while preserving literal union types for TTL strategies.
- id: svelte_ts_0007_exp_014
  instruction: Create strongly-typed Svelte stores for a shopping cart using utility types to ensure type safety across the
    write/read boundary. Implement DeepReadonly for the cart state exposed to components, use Pick to create summary types
