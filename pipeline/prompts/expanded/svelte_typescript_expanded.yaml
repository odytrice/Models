- id: svelte_ts_0008_exp_026
  instruction: Implement animation architecture with GSAP and SvelteKit using strict TypeScript for a marketing site. Configure
    path aliases ($animations, $transitions, $scroll), implement barrel exports for animation composables (fade-in, parallax,
    stagger-list), use type-only imports for GSAP Timeline and ScrollTrigger types, create ambient declarations for reduced-motion
    preferences, configure exactOptionalPropertyTypes for optional animation parameters, and implement strict typing for Svelte
    action functions with proper return types for update and destroy lifecycle hooks.
- id: svelte_ts_0008_exp_027
  instruction: Set up a SvelteKit project with WebAssembly integration for image processing using strict TypeScript. Configure
    path aliases ($wasm, $processors, $workers), implement barrel exports for WASM module wrappers (resize, filter, encode),
    use type-only imports for WebAssembly.Memory and exported function signatures, create ambient declarations for WASM module
    URLs and memory limits, enable noUncheckedIndexedAccess for safe pixel array manipulation, and implement strict typing
    for the Comlink proxy pattern used in Web Workers for off-main-thread processing.
