teacher: kimi
domain: svelte_typescript
system_prompt: 'You are an expert Svelte 5 and TypeScript developer.

  Write modern, production-quality code using Svelte 5 runes syntax ($state, $derived, $effect, $props).

  Follow these conventions:

  - Always use Svelte 5 runes (NOT Svelte 4 stores or reactive declarations)

  - Use TypeScript for all script blocks (<script lang="ts">)

  - Use SvelteKit 2 conventions for routing, load functions, and form actions

  - Include proper TypeScript types and interfaces

  - Write concise explanations (2-3 sentences max) before the code

  - Show file paths as comments (e.g., // src/routes/+page.svelte)

  '
temperature: 0.7
max_tokens: 6144
prompts:
- id: svelte_0001_exp_000
  instruction: Create a Svelte 5 e-commerce shopping cart component demonstrating all runes. Use $state for cart items and
    discount codes, $derived to calculate subtotal, tax, and final total with dynamic currency formatting, $effect to persist
    cart state to sessionStorage and sync across browser tabs, $props for product configuration options (currency, tax rate),
    and $bindable for quantity selectors that parents can control programmatically. Include error handling for localStorage
    quota exceeded scenarios.
- id: svelte_0001_exp_001
  instruction: Build a Svelte 5 healthcare patient vital signs monitor. Implement $state for real-time heart rate, blood pressure,
    and oxygen saturation readings, $derived to compute average trends over 5-minute windows and trigger alert states when
    vitals exceed thresholds, $effect to log critical events to a medical audit trail API with retry logic, $props for patient
    ID and monitoring sensitivity settings, and $bindable for manual override controls that nurses can toggle. Ensure the
    $effect cleanup prevents memory leaks when unmounting.
- id: svelte_0001_exp_002
  instruction: Refactor a legacy Svelte 4 cryptocurrency dashboard to Svelte 5 runes. Convert `export let` declarations to
    $props with destructuring and defaults, transform `$:` reactive statements to $derived for price change calculations and
    $effect for WebSocket connection management, replace top-level `let` with $state for wallet balances. Show the before/after
    comparison and explain why $derived.rune prevents stale price data during rapid market fluctuations.
- id: svelte_0001_exp_003
  instruction: Design a Svelte 5 IoT smart home thermostat controller. Use $state for current temperature, target temperature,
    and HVAC mode, $derived to calculate energy consumption estimates and efficiency ratings based on outside weather API
    data, $effect to send commands to hardware devices with debouncing to prevent rapid toggling, $props for device ID and
    eco-mode defaults, and $bindable for the target temperature slider that supports both user input and automated schedule
    adjustments.
- id: svelte_0001_exp_004
  instruction: Debug a broken Svelte 5 component where reactivity isn't working as expected. The component uses $state for
    a form object, $derived for validation errors, and $effect for API submission, but updates to nested form fields aren't
    triggering recalculations. Identify the bug (missing $state in nested objects), fix it using $state.frozen or granular
    $state for complex objects, and explain the difference between deep and shallow reactivity in Svelte 5.
- id: svelte_0001_exp_005
  instruction: Implement a Svelte 5 social media post composer with advanced text processing. Use $state for post content
    and media attachments, $derived to calculate character count, readability score, and suggested hashtags in real-time,
    $effect to auto-save drafts to IndexedDB with dirty-state tracking, $props for user permissions and max character limits,
    and $bindable for the content field that allows parent components to inject template text or clear the field programmatically.
- id: svelte_0001_exp_006
  instruction: Create a Svelte 5 financial budget tracker with strict accuracy requirements. Use $state for transaction entries
    with immutable updates, $derived to compute running balances with BigDecimal precision (avoiding floating point errors)
    and categorize spending by type, $effect to encrypt and sync data to a secure cloud endpoint with conflict resolution,
    $props for budget period and currency locale, and $bindable for inline editing of transaction amounts with validation
    feedback.
- id: svelte_0001_exp_007
  instruction: Build a Svelte 5 real-time collaborative document editor. Use $state for document content and cursor positions,
    $derived to compute word counts, reading time, and collaborator presence indicators, $effect to establish WebSocket connections
    with automatic reconnection logic and operational transformation for concurrent edits, $props for document ID and user
    permissions, and $bindable for content that supports both local typing and remote incoming changes without cursor jumping.
- id: svelte_0001_exp_008
  instruction: Develop a Svelte 5 accessibility-focused modal dialog system. Use $state for open/closed state and focus trap
    management, $derived to determine ARIA attributes (aria-hidden, aria-expanded) based on modal state and content overflow,
    $effect to manage focus restoration to trigger elements and prevent background scrolling, $props for size variants and
    close-on-backdrop settings, and $bindable for the open state that respects reduced-motion preferences and screen reader
    announcements.
- id: svelte_0001_exp_009
  instruction: Design a Svelte 5 data table with complex filtering and sorting. Use $state for row data, column visibility,
    and filter inputs, $derived to implement multi-column sort priorities and filtered views that update when either data
    or filters change, $effect to fetch paginated data from a REST API with abort controller cleanup on rapid filter changes,
    $props for column definitions and row actions, and $bindable for selected rows that supports shift-click range selection.
- id: svelte_0001_exp_010
  instruction: Create a Svelte 5 image gallery with lazy loading and masonry layout. Use $state for image metadata and viewport
    intersection entries, $derived to calculate optimal column distribution and aspect-ratio-preserving dimensions, $effect
    to load high-res images progressively and clean up object URLs to prevent memory leaks, $props for gallery ID and gap
    spacing options, and $bindable for the currently selected image index that supports keyboard navigation (arrow keys, escape).
- id: svelte_0001_exp_011
  instruction: Implement a Svelte 5 notification toast system with queue management. Use $state for the notification queue
    and pause state, $derived to calculate progress bars and auto-dismiss timings based on message priority, $effect to handle
    entrance/exit animations using FLIP technique and pause timers when window loses focus, $props for position (top-right,
    bottom-center) and max visible count, and $bindable for the notification queue allowing programmatic dismissal from parent
    components.
- id: svelte_0001_exp_012
  instruction: Build a Svelte 5 multi-step form wizard with validation. Use $state for step completion status and form data
    across steps, $derived to determine step validity and navigation availability (can proceed, can go back), $effect to validate
    current step fields asynchronously and auto-advance on valid completion if configured, $props for step titles and validation
    schemas, and $bindable for current step index that allows external navigation controls and deep-linking support.
- id: svelte_0001_exp_013
  instruction: Develop a Svelte 5 stock trading interface with high-frequency updates. Use $state for order book data and
    portfolio positions, $derived to calculate unrealized P&L with memoization for performance, $effect to throttle WebSocket
    updates to 60fps for UI rendering while maintaining data accuracy, $props for trading pairs and risk limits, and $bindable
    for order quantity inputs that respect lot size increments and maximum position limits enforced in real-time.
- id: svelte_0001_exp_014
  instruction: Create a Svelte 5 calendar event scheduler with drag-and-drop. Use $state for events and drag state, $derived
    to calculate conflicting events, available time slots, and resource utilization percentages, $effect to sync changes to
    a backend with optimistic UI updates and rollback on failure, $props for calendar view type (day/week/month) and business
    hours, and $bindable for selected date ranges that support recurring event patterns and timezone conversions.
- id: svelte_0001_exp_015
  instruction: Design a Svelte 5 analytics dashboard with real-time charts. Use $state for time-series data and chart configuration,
    $derived to compute moving averages, percentile rankings, and data aggregation buckets based on selected time ranges,
    $effect to manage Chart.js or D3 instances with proper cleanup and resize observers, $props for metric IDs and color themes,
    and $bindable for date range pickers that support relative ranges (last 7 days) and absolute dates with validation.
- id: svelte_0001_exp_016
  instruction: Implement a Svelte 5 file upload component with chunked uploads. Use $state for file metadata, upload progress
    per chunk, and overall status, $derived to calculate upload speed, ETA, and completion percentage across parallel chunk
    uploads, $effect to manage concurrent upload workers with retry logic and cancellation tokens, $props for accepted MIME
    types and max file size, and $bindable for the selected files array that allows pre-upload validation and reordering.
- id: svelte_0001_exp_017
  instruction: Build a Svelte 5 chat interface with message threading. Use $state for messages, reply threads, and user typing
    indicators, $derived to organize messages into chronological trees and highlight unread counts, $effect to scroll to bottom
    on new messages unless user is reading history (with scroll detection), $props for room ID and message retention policies,
    and $bindable for message input content that supports @mentions with autocomplete and emoji picker integration.
- id: svelte_0001_exp_018
  instruction: Develop a Svelte 5 game inventory system with complex interactions. Use $state for item stacks, equipment slots,
    and drag operations, $derived to calculate total weight, equipment bonuses, and valid drop zones based on item types,
    $effect to auto-save to localStorage with debouncing and handle item durability decay over time, $props for inventory
    capacity and game mode (survival/creative), and $bindable for selected item that supports context menu actions and keyboard
    shortcuts.
- id: svelte_0001_exp_019
  instruction: Create a Svelte 5 video conferencing component with device management. Use $state for local/remote video streams
    and audio levels, $derived to compute layout grids based on participant count and dominant speaker detection, $effect
    to manage MediaStream tracks with proper disposal and handle device change events (bluetooth headset switching), $props
    for room credentials and default mute/video settings, and $bindable for audio/video enabled states that sync with browser
    permissions and system mute states.
- id: svelte_0001_exp_020
  instruction: Design a Svelte 5 search interface with debounced suggestions. Use $state for query string and search history,
    $derived to filter suggestions based on fuzzy matching and recent selections, $effect to implement debounced API calls
    with request deduplication (cancelling previous requests) and loading states, $props for search endpoint and minimum query
    length, and $bindable for the query that supports programmatic search triggers and URL synchronization for shareable searches.
- id: svelte_0001_exp_021
  instruction: Implement a Svelte 5 theme system with system preference detection. Use $state for current theme mode, $derived
    to resolve effective theme (respecting system dark mode preference when set to 'auto') and generate CSS custom properties,
    $effect to apply themes to document root and persist preference to localStorage with cross-tab synchronization via storage
    events, $props for available themes and transition duration, and $bindable for theme mode that animates smoothly between
    states.
- id: svelte_0001_exp_022
  instruction: Build a Svelte 5 pagination component with prefetching. Use $state for current page and cached page data, $derived
    to calculate visible page numbers (ellipses for large ranges) and prefetch candidates (next page, previous page), $effect
    to prefetch adjacent page data in background when idle and handle browser back/forward button integration, $props for
    total items, page size, and prefetch strategy, and $bindable for current page that validates against bounds and resets
    on filter changes.
- id: svelte_0001_exp_023
  instruction: Develop a Svelte 5 audio player with waveform visualization. Use $state for playback state, current time, and
    audio buffer data, $derived to calculate progress percentage, remaining time, and waveform peaks for visualization, $effect
    to manage HTML5 Audio element with proper event listeners and cleanup, handle media session API integration for lock screen
    controls, $props for track metadata and autoplay policies, and $bindable for current time that supports seeking and synchronized
    lyrics highlighting.
- id: svelte_0001_exp_024
  instruction: Create a Svelte 5 map component with marker clustering. Use $state for viewport bounds and marker data, $derived
    to cluster markers based on zoom level and viewport using supercluster algorithm, $effect to fetch additional markers
    when panning outside cached bounds with cancelable requests, $props for map style and initial coordinates, and $bindable
    for selected marker that supports popup content and smooth pan-to animations with offset calculations for UI overlays.
- id: svelte_0001_exp_025
  instruction: Design a Svelte 5 code editor with syntax highlighting. Use $state for code content and cursor position, $derived
    to compute line numbers, bracket matching highlights, and error underlines from syntax analysis, $effect to integrate
    with PrismJS or highlight.js with web workers for non-blocking parsing and manage editor shortcuts, $props for language
    mode and theme, and $bindable for code value that supports format-on-paste and collaborative cursors from other users.
- id: svelte_0001_exp_026
  instruction: Implement a Svelte 5 kanban board with drag-and-drop columns. Use $state for board columns, cards, and drag
    metadata, $derived to calculate WIP limits enforcement, column totals, and burndown statistics, $effect to persist board
    state with optimistic updates and conflict resolution for multi-user moves, $props for board ID and permission levels,
    and $bindable for card positions that animate smoothly between columns and support keyboard-based reordering for accessibility.
- id: svelte_0001_exp_027
  instruction: Build a Svelte 5 user profile form with avatar cropping. Use $state for profile data and image crop coordinates,
    $derived to generate cropped image preview and validation status for required fields, $effect to handle image upload to
    CDN with progress tracking and EXIF data stripping for privacy, $props for available profile fields and validation rules,
    and $bindable for the complete profile object that supports partial saves and dirty-state detection before navigation.
- id: svelte_0001_exp_028
  instruction: Develop a Svelte 5 rate limiter component for API calls. Use $state for request timestamps and quota remaining,
    $derived to calculate current request rate and estimated reset time based on sliding window algorithm, $effect to queue
    requests when rate limited with exponential backoff and notify when quota refreshes, $props for rate limits (requests
    per minute) and burst capacity, and $bindable for request queue that allows priority escalation for user-initiated actions
    over background sync.
- id: svelte_0001_exp_029
  instruction: Create a Svelte 5 virtualized list for large datasets. Use $state for scroll position and visible window indices,
    $derived to calculate total height, visible item range, and overscan buffers for smooth scrolling, $effect to recycle
    DOM nodes and maintain scroll position during dynamic item height updates, $props for item count, estimated item height,
    and overscan count, and $bindable for scroll position that supports programmatic scrolling to specific items with alignment
    options (start, center, end).
- id: svelte_0002_exp_000
  instruction: "Implement a Svelte 5 e-commerce Cart class using $state that manages items, quantities, \nand total calculations.\
    \ Ensure the class safely handles SSR by not sharing state between \nserver requests, and demonstrate how to provide it\
    \ via Svelte's context API to child \ncomponents (CartItem, CartSummary) without leaking data between users."
- id: svelte_0002_exp_001
  instruction: "Create a reactive FormValidator class with Svelte 5 $state for real-time validation \nof a multi-field registration\
    \ form. Include methods for validateField, validateAll, \nand resetValidation. Show how to instantiate this class in a\
    \ parent component and \npass reactive validation state to child input components using function-based context."
- id: svelte_0002_exp_002
  instruction: "Build a real-time CollaborationSession class for a collaborative document editor \nusing Svelte 5 $state.\
    \ Handle WebSocket connection status, active users cursors, \nand pending operations. Address concurrency challenges and\
    \ optimistic updates while \nensuring the state is properly isolated per browser tab (not shared across SSR requests)."
- id: svelte_0002_exp_003
  instruction: "Design a PatientMonitor class for a healthcare dashboard using Svelte 5 $state to \ntrack vital signs (heart\
    \ rate, blood pressure, oxygen levels) from IoT devices. \nImplement methods for alert thresholds, historical data buffering,\
    \ and emergency \nstate escalation. Ensure memory-efficient handling of high-frequency data updates."
- id: svelte_0002_exp_004
  instruction: "Develop a SecureTransactionManager class for fintech applications using Svelte 5 $state \nthat handles multi-step\
    \ payment flows. Include state for transaction status, 2FA \nverification steps, and audit logging. Ensure sensitive data\
    \ is never stored in \nshared server-side variables and implement proper cleanup on component destruction."
- id: svelte_0002_exp_005
  instruction: "Refactor a legacy Svelte store-based social media feed to use a Svelte 5 FeedController \nclass with $state.\
    \ Implement pagination, pull-to-refresh, and cached post metadata. \nAddress the specific SSR gotcha where component state\
    \ is preserved during navigation \nbetween different user profiles, ensuring data refreshes appropriately."
- id: svelte_0002_exp_006
  instruction: "Create a GameStateManager class for a turn-based strategy game using Svelte 5 $state. \nImplement undo/redo\
    \ functionality with a state history stack, current player tracking, \nand move validation. Ensure the history doesn't\
    \ cause memory leaks during long gaming \nsessions and handle hydration mismatches between server and client."
- id: svelte_0002_exp_007
  instruction: "Implement a ThemeEngine class using Svelte 5 $state that manages dark/light mode, \naccent colors, and accessibility\
    \ preferences (high contrast, font size). Show how to \npersist preferences to localStorage while ensuring no \"flash\
    \ of wrong theme\" during \nSSR hydration. Use context to provide theme state to deeply nested components."
- id: svelte_0002_exp_008
  instruction: "Build a MultiStepWizard class for a complex onboarding flow using Svelte 5 $state. \nHandle step validation,\
    \ data persistence between steps, and browser back/forward \nnavigation integration. Ensure step state is preserved when\
    \ users navigate away \nand return, but properly resets when starting a new wizard instance."
- id: svelte_0002_exp_009
  instruction: "Design a NotificationQueue class using Svelte 5 $state that manages toast notifications \nwith priorities,\
    \ auto-dismiss timers, and action buttons. Implement methods for enqueue, \ndismiss, and clearAll. Handle edge cases like\
    \ rapid successive notifications and \nmemory cleanup when notifications are dismissed."
- id: svelte_0002_exp_010
  instruction: "Create a DragAndDropManager class using Svelte 5 $state for a Kanban board application. \nTrack dragged item\
    \ state, drop zones, and placeholder positions. Ensure reactive \nupdates during drag operations without excessive re-renders,\
    \ and handle touch/mobile \ninteractions alongside mouse events."
- id: svelte_0002_exp_011
  instruction: "Implement a SearchFilterManager class using Svelte 5 $state for an e-commerce product \ncatalog. Manage search\
    \ queries, facet filters, sorting, and URL synchronization. \nDebounce expensive search operations and handle the preservation\
    \ of search state \nduring browser navigation (back/forward buttons)."
- id: svelte_0002_exp_012
  instruction: "Build an AudioPlayerState class using Svelte 5 $state for a music streaming interface. \nTrack playback state,\
    \ current time, buffered ranges, playlist queue, and volume. \nHandle the complexity of reactive updates from the HTML5\
    \ Audio element while \nensuring SSR compatibility (no direct DOM access during server rendering)."
- id: svelte_0002_exp_013
  instruction: "Develop a RealTimeChartDataManager class using Svelte 5 $state for financial tickers. \nHandle high-frequency\
    \ data updates (100ms intervals), data windowing (sliding window \nof last 1000 points), and pause/resume functionality.\
    \ Optimize for performance to \nprevent UI freezing with large datasets."
- id: svelte_0002_exp_014
  instruction: "Create an AuthSessionManager class using Svelte 5 $state handling JWT tokens, refresh \ntoken rotation, and\
    \ session expiration. Implement methods for login, logout, and \ntokenRefresh. Ensure secure handling of credentials (never\
    \ stored in global/shared \nvariables) and automatic logout on 401 errors."
- id: svelte_0002_exp_015
  instruction: "Design a PaginationController class using Svelte 5 $state supporting both offset and \ncursor-based pagination.\
    \ Include methods for nextPage, previousPage, and jumpToPage. \nHandle loading states, error retries, and prefetching\
    \ next page data. Ensure proper \nreset behavior when query parameters change."
- id: svelte_0002_exp_016
  instruction: "Implement an ImageGalleryState class using Svelte 5 $state for a photo viewer with \nthumbnails, full-screen\
    \ mode, and lazy loading. Track loading states for individual \nimages, preloading adjacent images, and keyboard navigation\
    \ (arrow keys, escape). \nHandle the preservation of scroll position when navigating back to gallery."
- id: svelte_0002_exp_017
  instruction: "Build a ChatRoomManager class using Svelte 5 $state for a messaging application. \nHandle message history,\
    \ optimistic message sending, read receipts, and typing indicators. \nImplement methods for loadMoreMessages (infinite\
    \ scroll) and handle connection \ndrops with message queuing for retry."
- id: svelte_0002_exp_018
  instruction: "Create a CalendarEventManager class using Svelte 5 $state for a scheduling application. \nHandle recurring\
    \ events (RRULE parsing), timezone conversions, and drag-to-resize \nfunctionality. Ensure proper reactive updates when\
    \ events span multiple days or \nwhen daylight saving time transitions occur."
- id: svelte_0002_exp_019
  instruction: "Develop a DocumentAutoSave class using Svelte 5 $state for a rich text editor. Track \ndocument dirty state,\
    \ last saved timestamp, and conflict detection (if server version \nis newer). Implement debounced auto-save and manual\
    \ save with offline support using \nIndexedDB fallback."
- id: svelte_0002_exp_020
  instruction: "Design a WishlistSyncManager class using Svelte 5 $state that synchronizes wishlist \ndata between localStorage\
    \ (for guests) and server database (for authenticated users). \nHandle merge conflicts when a user logs in and has items\
    \ in both local and server \nwishlists. Ensure SSR safety by checking for browser APIs only in client-side code."
- id: svelte_0002_exp_021
  instruction: "Implement a VideoConferenceState class using Svelte 5 $state for a WebRTC video call \ninterface. Manage local/remote\
    \ tracks, screen sharing state, participant grid layout, \nand connection quality metrics. Handle the complexity of reactive\
    \ state updates \nfrom WebRTC events while managing memory cleanup of media streams."
- id: svelte_0002_exp_022
  instruction: "Create a CodeEditorState class using Svelte 5 $state for a browser-based IDE. Track \nopen files, cursor positions,\
    \ undo/redo stacks per file, and search/replace state. \nImplement methods for split-pane view management and ensure state\
    \ is properly \ngarbage collected when files are closed."
- id: svelte_0002_exp_023
  instruction: "Build a DashboardLayoutManager class using Svelte 5 $state for a customizable analytics \ndashboard. Handle\
    \ widget positions (grid layout), resize operations, collapsed states, \nand layout persistence to user preferences. Ensure\
    \ responsive behavior updates reactive \nstate when container dimensions change."
- id: svelte_0002_exp_024
  instruction: "Develop a FileUploadCoordinator class using Svelte 5 $state handling multiple concurrent \nfile uploads with\
    \ chunked uploading for large files. Track progress per file, pause/resume \nfunctionality, and retry logic for failed\
    \ chunks. Calculate total remaining time based \non upload speeds and handle cancellation of in-flight requests."
- id: svelte_0002_exp_025
  instruction: "Design an AccessibilityAnnouncer class using Svelte 5 $state for screen reader support. \nManage ARIA live\
    \ regions for dynamic content updates, focus management for modal dialogs, \nand keyboard navigation shortcuts. Ensure\
    \ announcements don't queue up excessively and \nclear properly to avoid confusing screen reader users."
- id: svelte_0002_exp_026
  instruction: "Implement a FeatureFlagManager class using Svelte 5 $state for A/B testing and gradual \nrollouts. Handle\
    \ user bucketing, feature availability based on user attributes, and \nreal-time flag updates from remote configuration.\
    \ Ensure consistent flag values \nduring SSR to prevent hydration mismatches."
- id: svelte_0002_exp_027
  instruction: "Create a PerformanceProfiler class using Svelte 5 $state for monitoring component \nrender times and memory\
    \ usage. Track FPS drops, long tasks, and memory leaks across \nnavigation. Implement methods for starting/stopping profiling\
    \ sessions and generating \nperformance reports, ensuring the profiling itself doesn't cause performance degradation."
- id: svelte_0002_exp_028
  instruction: "Build a LocalizationManager class using Svelte 5 $state handling dynamic locale switching, \ncurrency conversion\
    \ with live exchange rates, and pluralization rules. Ensure proper \nreactivity when locale changes (re-rendering all\
    \ formatted content) and handle \nright-to-left (RTL) layout state transitions."
- id: svelte_0002_exp_029
  instruction: "Debug and refactor a problematic SvelteKit application where a shared UserPreferences \nclass instance is\
    \ causing data leaks between different users on the server during SSR. \nConvert the global singleton pattern to a proper\
    \ Svelte 5 $state class instance provided \nvia context, ensuring each request gets isolated state while maintaining reactivity\
    \ \nacross client-side component tree."
- id: svelte_0003_exp_000
  instruction: Implement a real-time patient monitoring dashboard in Svelte 5 using `$effect` to manage a WebSocket connection
    to a vital signs stream. Include proper cleanup that disposes the connection when the component unmounts, handles reconnection
    with exponential backoff on connection failure, and displays connection status. Show how dependency tracking works when
    updating the UI with incoming heart rate data.
- id: svelte_0003_exp_001
  instruction: Refactor a legacy Svelte 4 chat component that uses `$:` reactive statements to Svelte 5's `$effect.pre` rune.
    The component must preserve scroll position at the bottom when new messages arrive (before DOM updates), but allow the
    user to scroll up to read history without auto-scrolling. Include proper cleanup of scroll listeners and explain the timing
    difference between `$effect` and `$effect.pre`.
- id: svelte_0003_exp_002
  instruction: Debug a Svelte 5 component where `$effect` is running in an infinite loop. The component fetches user data
    when `userId` changes, but also updates a `lastFetched` timestamp inside the effect. Identify why this causes never-ending
    updates, refactor to separate concerns using `$derived` for the timestamp, and demonstrate proper dependency tracking
    with async operations.
- id: svelte_0003_exp_003
  instruction: Create a stock trading interface using `$effect.pre` to capture DOM measurements before React renders a large
    list of price updates. Calculate the height of a virtual list container before the DOM updates to prevent layout shift,
    then use `$effect` (post-DOM) to apply highlight animations to changed prices. Include teardown functions for both effects.
- id: svelte_0003_exp_004
  instruction: Design an IoT device management system where `$effect` sets up event listeners for hardware status updates.
    Demonstrate proper cleanup when devices are rapidly added/removed from the view (memory leak prevention), and explain
    why reading device properties asynchronously inside `setTimeout` breaks dependency tracking. Use `untrack` to prevent
    unnecessary re-runs when logging metrics.
- id: svelte_0003_exp_005
  instruction: Implement a collaborative whiteboard using `$effect` to synchronize canvas drawing operations via WebSocket.
    Handle cleanup when switching between different whiteboard rooms (clearing canvas and closing connections), and use `$effect.pre`
    to calculate canvas coordinates before the draw operation to ensure smooth cursor tracking. Include error handling for
    connection drops.
- id: svelte_0003_exp_006
  instruction: Compare `$effect` vs `$effect.pre` behavior in a form wizard component that spans multiple steps. Use `$effect.pre`
    to save scroll position before step transitions (preventing jump to top), and `$effect` to focus the first input field
    after the DOM updates. Explain the microtask timing and when each runs relative to DOM mutations.
- id: svelte_0003_exp_007
  instruction: Build a live auction bidding component where `$effect` manages a WebSocket subscription to bidding updates.
    Implement a teardown function that gracefully unsubscribes from the auction room when the user navigates away, and demonstrate
    conditional dependency tracking where the effect only reconnects if `isAuthenticated` is true, otherwise shows a login
    prompt.
- id: svelte_0003_exp_008
  instruction: Debug dependency tracking in a healthcare analytics dashboard where `$effect` fails to re-run when updating
    nested properties of a `patientData` object. Explain object identity vs. property mutation tracking, refactor to use `$state`
    with immutable updates or `$derived` for computed values, and show when `$inspect` would help identify the issue.
- id: svelte_0003_exp_009
  instruction: Create a financial transaction feed using `$effect.pre` to maintain scroll position in an infinite scrolling
    list. Before the DOM updates with new transactions, capture the current scroll height; after DOM updates, restore the
    scroll position so the user doesn't lose their place. Include cleanup for the IntersectionObserver used for infinite loading.
- id: svelte_0003_exp_010
  instruction: Implement a multiplayer game lobby using `$effect` to sync game state via WebSocket. Handle the edge case where
    the component unmounts during an active connection attempt (race condition cleanup), and demonstrate why reading `gameState.players.length`
    asynchronously inside a `fetch` callback won't trigger re-runs when players join.
- id: svelte_0003_exp_011
  instruction: Refactor an e-commerce product image gallery from Svelte 4 to Svelte 5. Use `$effect.pre` to calculate image
    container dimensions before applying zoom transformations (preventing flash of unstyled content), and `$effect` to clean
    up event listeners for pinch-to-zoom gestures. Ensure backward compatibility with existing prop interfaces.
- id: svelte_0003_exp_012
  instruction: Design a secure banking dashboard where `$effect` manages WebSocket connections with authentication token refresh.
    Implement cleanup that cancels pending token refreshes when the component destroys, and use `untrack` to read the auth
    token inside the effect without creating a circular dependency on token updates.
- id: svelte_0003_exp_013
  instruction: Build a social media notification center demonstrating why `$effect` doesn't track object mutations. Show the
    difference between `notifications.push(newItem)` (won't trigger) vs. `notifications = [...notifications, newItem]` (will
    trigger). Implement proper cleanup for notification sound effects that should stop when the component unmounts.
- id: svelte_0003_exp_014
  instruction: Create a logistics tracking map using `$effect` to integrate with Google Maps JavaScript API. Initialize the
    map in `$effect`, update markers when `shipmentLocations` change with proper dependency tracking, and implement cleanup
    that removes event listeners and map instances to prevent memory leaks when switching between routes.
- id: svelte_0003_exp_015
  instruction: Debug a video conferencing component where `$effect` runs too frequently because it accesses `videoElement.currentTime`
    (a DOM property, not state). Refactor to use `$state` for the time display, `$effect.pre` for pre-rendering canvas overlays,
    and proper cleanup of `requestAnimationFrame` loops when the call ends.
- id: svelte_0003_exp_016
  instruction: Implement an educational code editor using `$effect` to sync with a WebSocket collaboration server. Use `$effect.pre`
    to capture cursor position before applying remote edits (preventing cursor jump), and demonstrate conditional dependencies
    where the effect only processes updates when `isCollaborating` is true, otherwise works offline.
- id: svelte_0003_exp_017
  instruction: Build a fitness workout timer using `$effect` with complex cleanup requirements. The effect should start an
    interval when `isActive` is true, clean up the interval when paused or destroyed, and handle the edge case where `duration`
    changes mid-workout (clear old interval, start new one with updated time). Explain why `duration` must be read synchronously
    to track properly.
- id: svelte_0003_exp_018
  instruction: Design a news feed with virtual scrolling using `$effect.pre` to calculate row heights before DOM paint. Measure
    the container and estimate heights for off-screen items to maintain scroll position accuracy, then use `$effect` to clean
    up resize observers when the feed unmounts. Handle rapid scrolling where effects might queue up.
- id: svelte_0003_exp_019
  instruction: Create a cryptocurrency wallet interface demonstrating async dependency pitfalls. Show why reading `balance`
    inside a `setTimeout` or after `await fetch()` won't establish reactivity, and refactor to read state synchronously at
    the top of `$effect`. Include WebSocket cleanup for price ticker updates when switching between coins.
- id: svelte_0003_exp_020
  instruction: Refactor a legacy Svelte 4 data table that uses `afterUpdate` lifecycle hooks to Svelte 5 `$effect` and `$effect.pre`.
    Preserve the behavior where column widths are calculated before DOM updates (using `$effect.pre`) and selection state
    is synced after DOM updates. Ensure the refactor handles edge cases like empty data sets.
- id: svelte_0003_exp_021
  instruction: Implement a smart home control panel using `$effect` to manage WebSocket connections to multiple device hubs
    simultaneously. Create a connection pool with individual cleanup functions for each hub, demonstrate handling partial
    failures (one hub disconnects while others remain), and use `untrack` for logging that shouldn't trigger re-runs.
- id: svelte_0003_exp_022
  instruction: Build a text-to-speech reader using `$effect.pre` to prepare utterance text before the speech synthesis queue
    updates, and `$effect` to handle cleanup of `speechSynthesis.cancel()` when the component unmounts or the user navigates
    to a new document. Handle edge cases where the browser pauses speech when tab loses focus.
- id: svelte_0003_exp_023
  instruction: Debug a photo editing canvas where `$effect` creates a memory leak by adding event listeners without cleanup.
    Refactor to return a teardown function that removes `mousemove` and `mouseup` listeners, use `$effect.pre` to calculate
    image scaling before drawing to canvas, and explain why `canvas` element references don't need to be in dependencies.
- id: svelte_0003_exp_024
  instruction: Create a live sports scoring widget using `$effect` with conditional dependencies. The effect should only subscribe
    to score updates when `isLive` is true and `selectedMatch` is not null. Demonstrate how changing `selectedMatch` unsubscribes
    from the old match and subscribes to the new one atomically using the teardown pattern.
- id: svelte_0003_exp_025
  instruction: Design a restaurant POS system using `$effect.pre` to capture the state of an ongoing order form before applying
    real-time inventory updates (preventing user input loss). Use `$effect` to sync order modifications to the kitchen display
    WebSocket, with proper cleanup when orders are completed or cancelled mid-sync.
- id: svelte_0003_exp_026
  instruction: Implement a music sequencer using `$effect` to synchronize WebSocket-based collaborative editing. Handle the
    advanced edge case where multiple users simultaneously add notes (conflict resolution), use `$effect.pre` to calculate
    audio buffer sizes before the Web Audio API updates, and ensure AudioNodes are properly disconnected in cleanup.
- id: svelte_0003_exp_027
  instruction: Build a project management Kanban board using `$effect.pre` to measure card positions before drag-and-drop
    operations (preventing layout jumps), and `$effect` to clean up `dragover` event listeners. Demonstrate why reading `draggedCard.position`
    inside an async `fetch` to save to the server won't track position changes during the drag.
- id: svelte_0003_exp_028
  instruction: Create a weather monitoring station using `$effect` to manage multiple sensor data streams via WebSocket. Implement
    a pattern where the effect teardown unsubscribes from specific sensor types when they are deselected (rather than closing
    the whole connection), and use `$derived` for computed wind chill that `$effect` depends on.
- id: svelte_0003_exp_029
  instruction: Debug and fix a Svelte 5 component where `$effect.pre` causes an infinite loop by updating state that is also
    read by the effect. Refactor to use `$effect.pre` only for DOM measurements (scroll position) and `$effect` for state
    updates, explaining the execution order and why `$effect.pre` should generally not update state that affects the pre-DOM
    calculation.
