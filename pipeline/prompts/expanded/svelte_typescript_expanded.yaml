  instruction: Build a payment processing flow in SvelteKit with strict type narrowing for `PaymentIntent` (RequiresConfirmation
    | Processing | RequiresAction | Succeeded | Failed). Create custom type guards `is3DSRequired` and `isRetryable` for error
    handling. Implement assertion functions for PCI-DSS compliant data handling. Use the `in` operator to narrow payment method-specific
    authentication flows. Define branded types `PaymentIntentId` and `MerchantReference` with idempotency validation. Handle
    webhook event ordering where events might arrive out of sequence and ensure type guards accommodate Stripe/Adyen/Braintree
    API differences.
- id: svelte_ts_0006_exp_022
  instruction: Create an encrypted messaging system in Svelte 5 with discriminated unions `EncryptedMessage` (Text | File
    | System | Ephemeral). Implement custom type guards `isDecryptable` and `isForwarded` for security verification. Build
    assertion functions for end-to-end encryption key validation. Use the `in` operator to narrow message metadata for forward
    secrecy. Define branded types `DeviceKeyId` and `MessageHash` with cryptographic verification. Handle offline message
    queuing where encryption state might be stale and ensure type guards accommodate signal protocol session state variations.
- id: svelte_ts_0006_exp_023
  instruction: Design a calendar scheduling system in SvelteKit with discriminated unions `CalendarEvent` (Fixed | Recurring
    | Tentative | Cancelled). Create custom type guards `isReschedulable` and `isConflictFree` for availability logic. Implement
    assertion functions for timezone-aware validation. Use the `in` operator to narrow attendee response status properties.
    Define branded types `EventUID` and `TimezoneId` with IANA validation. Handle daylight saving time transitions where event
    times might be ambiguous and ensure type guards accommodate iCalendar (RFC 5545) recurrence rule parsing.
- id: svelte_ts_0006_exp_024
  instruction: Implement a document processing pipeline in Svelte 5 with discriminated unions `Document` (PDF | Word | Image
    | Spreadsheet). Create custom type guards `isOCRProcessed` and `isSearchable` for text extraction status. Build assertion
    functions for virus scanning and malware detection. Use the `in` operator to narrow metadata extraction results. Define
    branded types `DocumentId` and `PageReference` with validation logic. Handle corrupted file uploads where partial data
    needs type reconstruction and ensure type guards accommodate cloud storage API variations (S3, Azure Blob, GCS).
- id: svelte_ts_0006_exp_025
  instruction: Build a microservices health check dashboard in SvelteKit with discriminated unions `ServiceStatus` (Healthy
    | Degraded | Unhealthy | Unknown). Create custom type guards `isCircuitBreakerOpen` and `isRetryable` for resilience patterns.
    Implement assertion functions for service mesh validation. Use the `in` operator to narrow optional telemetry data. Define
    branded types `ServiceName` and `TraceId` with naming convention validation. Handle distributed tracing where spans might
    arrive out of order and ensure type guards accommodate gRPC/REST/GraphQL protocol differences in health responses.
- id: svelte_ts_0006_exp_026
  instruction: Create a testing utility library in Svelte 5 with type-safe mock data generators using discriminated unions
    `MockScenario` (Success | NetworkError | Timeout | ValidationError). Implement custom type guards `isMockResponse` and
    `isErrorScenario` for test isolation. Build assertion functions for mock contract validation against real APIs. Use the
    `in` operator to narrow optional mock delays and latency simulation. Define branded types `ScenarioId` and `MockVersion`
    with compatibility checks. Handle parallel test execution where mock state needs thread-safe type guarantees and ensure
    type guards work with Playwright/Vitest test runners.
- id: svelte_ts_0006_exp_027
  instruction: Design a design system component library in SvelteKit with strict type narrowing for `ComponentVariant` (Primary
    | Secondary | Destructive | Ghost). Create custom type guards `isInteractive` and `isAccessible` for ARIA validation.
    Implement assertion functions for required prop combinations. Use the `in` operator to narrow slot content types. Define
    branded types `ComponentId` and `ThemeToken` with design token validation. Handle server-side rendering where hydration
    might fail due to theme mismatch and ensure type guards accommodate CSS custom property variations across themes.
- id: svelte_ts_0007_exp_000
  instruction: Implement type-safe product configuration management for a SvelteKit e-commerce admin panel using Pick to create
    lightweight product summary types for list views and Omit to strip internal fields from public API responses. Include
    a DeepReadonly wrapper for the pricing configuration object to prevent accidental mutation in shared stores, and demonstrate
    how Satisfies validates the config object against a complex schema while preserving literal types for discriminated union
    narrowing in the UI.
- id: svelte_ts_0007_exp_001
  instruction: Design a HIPAA-compliant patient record system in SvelteKit where you use ReadonlyArray and ReadonlyMap from
    TypeScript utilities to enforce immutable medical histories in Svelte components. Create a DeepReadonly utility that recursively
    freezes nested diagnosis objects, then apply Extract to pull specific record types from a union of MedicalRecord | InsuranceRecord
    | AppointmentRecord for type-safe rendering in a patient dashboard.
- id: svelte_ts_0007_exp_002
  instruction: Build a type-safe transaction processing layer for a fintech SvelteKit application using branded types (nominal
    typing) combined with Template Literal Types to distinguish between USDTransactionIDs and EURTransactionIDs. Use the Satisfies
    operator to validate transaction configuration objects against complex union types while maintaining autocomplete, and
    implement ReturnType to extract proper typing for async transaction handlers used in form actions.
- id: svelte_ts_0007_exp_003
  instruction: 'Refactor a legacy SvelteKit social media app by replacing any types with strict utility patterns: use Exclude
    to remove deprecated post types from a union while maintaining backward compatibility, Parameters to type event handlers
    for the like/share/comment actions, and Record to create a type-safe mapping between content moderation statuses and their
    corresponding SVG icon components.'
- id: svelte_ts_0007_exp_004
  instruction: Create a robust IoT device management interface in SvelteKit using recursive conditional types to handle deeply
    nested sensor telemetry data (temperature > readings > hourly > statistics). Implement a custom DeepPartial utility for
    incremental updates to device configurations, and use ReturnType to properly type WebSocket message handlers that process
    incoming binary data streams from hardware devices.
- id: svelte_ts_0007_exp_005
  instruction: Develop type-safe logistics tracking in SvelteKit by creating a discriminated union of ShippingEvent types
    (PickedUp, InTransit, Delivered, Exception). Use Extract to filter events for the timeline view versus the map view, and
    implement a typed event emitter using Parameters to ensure handler functions match the specific event payload shapes when
    subscribing to real-time updates via Server-Sent Events.
- id: svelte_ts_0007_exp_006
  instruction: Design an educational platform's grade book system using Record utility types to map StudentIDs to GradeBookEntries,
    ensuring type safety when accessing nested properties. Apply Partial for draft grade entries that auto-save to localStorage,
    Required for final submission validation, and demonstrate how Satisfies prevents excess property checks while catching
    missing required fields in the grading rubric configuration.
- id: svelte_ts_0007_exp_007
  instruction: Implement a game state management system in SvelteKit for a multiplayer RPG using mapped types to create read-only
    views of player inventories. Create a PowerUpConfig type using template literal types for effect IDs (e.g., "buff:strength",
    "debuff:slow"), use Exclude to prevent certain power-ups from appearing in PvP contexts, and type the game loop's update
    function with ReturnType for the tick handler.
- id: svelte_ts_0007_exp_008
  instruction: Build a real estate listing platform with strict type safety for property drafts versus published listings.
    Use Required to enforce complete data before publishing, Pick to create lightweight card view types for the search results
    grid, and implement a custom utility type NullableProperties for optional fields in the filtering interface. Include error
    handling types using Parameters for the API error callbacks.
- id: svelte_ts_0007_exp_009
  instruction: Create a headless CMS content block system in SvelteKit using conditional types to map block types (Text, Image,
    Video, Gallery) to their specific data shapes. Use Exclude to filter out admin-only blocks from public API responses,
    and implement a type-safe block renderer using a Record mapping that Satisfies a BlockRendererContract, ensuring exhaustive
    type checking when new block types are added.
- id: svelte_ts_0007_exp_010
  instruction: 'Debug and fix type leaks in a SvelteKit application where implicit any types are causing runtime errors in
    production. Refactor the codebase to use strict utility types: convert loose object parameters to Pick for specific API
    subsets, implement Readonly for configuration constants that were being mutated accidentally, and use ReturnType to fix
    improperly typed async load functions that were losing Promise resolution types.'
- id: svelte_ts_0007_exp_011
  instruction: Design a type-safe internationalization system using template literal types to generate translation keys with
    autocomplete support (e.g., "nav.home", "nav.profile.settings"). Use Record to map locale codes to translation dictionaries,
    Satisfies to validate the shape of nested translation objects without widening string literals, and Extract to pull only
    the error message keys for the toast notification system.
- id: svelte_ts_0007_exp_012
  instruction: Implement a role-based access control (RBAC) system for a SvelteKit enterprise dashboard using Record to create
    permission matrices mapping UserRoles to ResourcePermissions. Apply Readonly to prevent runtime permission mutations,
