- id: k8s_0005_exp_025
  instruction: 'Design NetworkPolicies for a multiplayer game server hosting platform:

    1. Default deny all in ''gameservers'' namespace

    2. Allow game server instances on UDP ports 27015-27030 from load balancer

    3. Allow matchmaking service to reach game servers on port 27016

    4. Allow player statistics API to connect to ClickHouse on 8123

    5. Allow game servers to reach license validation endpoint on HTTPS

    Include port ranges and named port best practices.'
- id: k8s_0005_exp_026
  instruction: 'Write Kubernetes NetworkPolicies for a DevOps secrets management vault:

    1. Default deny all in ''secrets'' namespace

    2. Allow the vault to receive requests only from authorized service accounts

    3. Allow audit logging to PostgreSQL on 5432 within monitoring namespace

    4. Allow TLS communication between vault pods on port 8200

    5. Block all other ingress including from ingress controllers

    Explain serviceAccount selector and kubectl auth commands.'
- id: k8s_0005_exp_027
  instruction: 'Implement NetworkPolicies for a satellite telemetry ground station system:

    1. Default deny all in ''groundstation'' namespace

    2. Allow satellite downlink on UDP 5001 from station IP range (70.0.0.0/8)

    3. Allow command uplink on TCP 5002 to satellites

    4. Allow telemetry processor to connect to TimescaleDB on 5432

    5. Allow alerting to NASA DSN on specific whitelisted IPs

    Include complex ingressFrom scenarios and kubectl dry-run testing.'
- id: k8s_0005_exp_028
  instruction: 'Create Kubernetes NetworkPolicies for a research lab data processing cluster:

    1. Default deny all in ''research'' namespace

    2. Allow JupyterHub to spawn notebooks in user namespaces on port 8888

    3. Allow ML training jobs to access datasets on NFS storage on port 2049

    4. Allow results API to connect to PostgreSQL on 5432 for experiment metadata

    5. Allow egress to arXiv and PubMed APIs for literature retrieval

    Explain namespace isolation and cross-namespace communication patterns.'
- id: k8s_0006_exp_000
  instruction: Configure RBAC for a multi-tenant Kubernetes cluster where each tenant namespace needs isolated access to their
    own ConfigMaps and Secrets, but shared access to a common metrics namespace. Include tenant-scoped ServiceAccounts, Namespaced
    Roles, and a ClusterRole for cluster-wide monitoring. Implement namespace isolation to prevent cross-tenant access.
- id: k8s_0006_exp_001
  instruction: 'Debug a broken RBAC configuration where a Go microservice cannot read ConfigMaps in the production namespace.
    The error message is "secrets is forbidden: User \"system:serviceaccount:prod:payment-service\" cannot list resource \"configmaps\"
    in API group \"\" in the namespace \"prod\"". Analyze and fix the manifests to resolve the permission issue.'
- id: k8s_0006_exp_002
  instruction: Design RBAC for a GitOps workflow using ArgoCD running in the argocd namespace. The service account needs permissions
    to create, update, and delete resources across multiple target namespaces. Include best practices for separating deployment
    permissions from application runtime permissions and implement drift detection handling.
- id: k8s_0006_exp_003
  instruction: Implement time-bound elevated permissions for emergency incident response. Create a RoleBinding that grants
    temporary cluster-admin access to an incident responder's service account with automatic expiration after 4 hours using
    TTL annotations. Include audit logging for when elevated permissions are activated.
- id: k8s_0006_exp_004
  instruction: Configure Kubernetes RBAC for a Prometheus monitoring stack that needs to scrape metrics from all namespaces.
    Create ClusterRole and ClusterRoleBinding for the prometheus-server service account with minimal permissions for discovering
    and scraping pod and service endpoints. Include Anti-Affinity rules and resource limits.
- id: k8s_0006_exp_005
  instruction: Set up RBAC for a stateful MySQL operator that manages database clusters across multiple namespaces. The operator's
    service account needs permissions to create StatefulSets, Services, ConfigMaps, and Secrets. Include finalizer permissions
    and ownership references for proper cleanup during deletions.
- id: k8s_0006_exp_006
  instruction: Implement least-privilege RBAC for a CI/CD pipeline service account (Jenkins or GitHub Actions runner) that
    only deploys to specific namespaces, pulls images from a private registry, and reads secrets for specific deployment contexts.
    Prevent lateral movement to other namespaces.
- id: k8s_0006_exp_007
  instruction: Configure pod security policies for a Node.js application running as non-root with read-only filesystem, dropped
    ALL capabilities, and a specific seccomp profile. Create corresponding PSP or PodSecurityPolicy equivalent. Include runtime
    security scanning with Trivy integration.
- id: k8s_0006_exp_008
  instruction: Design RBAC for a service mesh (Istio/Linkerd) control plane where the sidecar injector needs permissions to
    modify pod specifications. Create necessary ClusterRoles and validate the configuration against security benchmarks including
    CIS Kubernetes Benchmark compliance.
- id: k8s_0006_exp_009
  instruction: Implement external secrets management using External Secrets Operator. Configure RBAC for the ESO controller
    to sync secrets from AWS Secrets Manager or HashiCorp Vault into the cluster. Include namespace-specific service accounts
    and secret store configurations.
- id: k8s_0006_exp_010
  instruction: Create a read-only audit role for security reviewers that can list and watch all resources across namespaces
    but cannot modify anything. Include ClusterRole with aggregation to existing admin and edit roles, and show how to bind
    this role to an external auditor's service account.
- id: k8s_0006_exp_011
  instruction: 'Configure RBAC for Kubernetes Dashboard access with different permission levels: read-only view for developers,
    full access for cluster admins, and namespace-limited access for application teams. Include API token generation and token
    cleanup for departed employees.'
- id: k8s_0006_exp_012
  instruction: Design RBAC for a batch job processing system where Spark jobs need temporary access to read data from specific
    S3 buckets via service account IAM roles (IRSA/EKS IAM Roles for Service Accounts). Include job-specific Role with TTL
    and automatic cleanup after job completion.
- id: k8s_0006_exp_013
  instruction: Implement network policies combined with RBAC for a zero-trust architecture. Configure Kubernetes NetworkPolicy
    to allow only authorized service accounts to communicate. Show how RBAC controls which pods can use which service accounts
    via RBAC authorization webhook.
- id: k8s_0006_exp_014
  instruction: Set up OPA Gatekeeper integration with RBAC constraints. Create ClusterRoles for the gatekeeper-controller
    and gatekeeper-audit service accounts. Define custom constraints that enforce naming conventions and required labels on
    resources created by specific service accounts.
- id: k8s_0006_exp_015
  instruction: Configure Kubernetes RBAC for a cross-cluster federation scenario where workloads in cluster-us-west-2 need
    to read ConfigMaps from cluster-us-east-2. Implement ClusterRole aggregation and validate with kubectl can-i commands.
    Include network latency considerations.
- id: k8s_0006_exp_016
  instruction: Design RBAC for a custom metrics autoscaler using KEDA. The keda-operator service account needs permissions
    to read Deployment states, query custom metrics APIs, and scale resources. Include HPA integration permissions and scaler-specific
    access patterns.
- id: k8s_0006_exp_017
  instruction: Implement sealed secrets in a GitOps workflow. Configure RBAC for the sealed-secrets-controller to decrypt
    secrets in target namespaces. Create namespace-scoped roles for developers who can only create SealedSecret resources,
    not raw Secrets.
- id: k8s_0006_exp_018
  instruction: Configure RBAC for runtime security with Falco. Create ClusterRole for the falco service account to read pod
    specs, network connections, and system calls. Include permissions for custom alert destinations and integrate with external
    SIEM systems.
- id: k8s_0006_exp_019
  instruction: Design RBAC for a Kubernetes operator pattern where a custom operator in namespace "operators" manages resources
    in multiple tenant namespaces. Implement owner reference-based permissions and garbage collection with proper RoleBinding
    propagation.
- id: k8s_0006_exp_020
  instruction: Set up RBAC for certificate management using cert-manager. The cert-manager service account needs permissions
    to read ConfigMaps, create and update Secrets, and access DNS challenges. Include ClusterIssuer and Issuer configurations
    with proper scoping.
- id: k8s_0006_exp_021
  instruction: Implement least-privilege access for a log aggregation system (EFK/Loki) where the log collector needs permissions
    to read pod logs, watch pod changes, and create index metadata. Include permission scoping to specific label selectors
    and time-based access patterns.
- id: k8s_0006_exp_022
  instruction: Configure ephemeral containers for debugging with proper RBAC. Create a Role that allows using ephemeral containers
    for pod debugging but restricts it to the "debuggers" group. Include audit logging for ephemeral container usage and automatic
    cleanup policies.
- id: k8s_0006_exp_023
  instruction: Design RBAC for a multi-cluster service mesh where one cluster's Istiod needs to validate AuthorizationPolicies
    from another cluster. Implement cross-cluster RBAC with mTLS and service account impersonation for inter-cluster communication.
- id: k8s_0006_exp_024
  instruction: Implement Pod Disruption Budgets with RBAC-controlled updates. Create a Role that allows only the cluster-autoscaler
    service account to modify PDBs, preventing application teams from accidentally disabling disruption protection. Include
    admission controller validation.
- id: k8s_0006_exp_025
  instruction: Configure ResourceQuotas and LimitRanges with RBAC enforcement. Create a Role that allows namespace admins
    to modify resource quotas within pre-defined bounds. Show how to prevent quota manipulation that could affect cluster
    stability.
- id: k8s_0006_exp_026
  instruction: Set up RBAC for a GitOps-based infrastructure operator (Crossplane or Terraform Cloud Operator). The operator
    service account needs permissions to manage cloud provider resources. Implement least-privilege IAM policies mapped to
    Kubernetes RBAC roles.
- id: k8s_0006_exp_027
  instruction: Design RBAC for a service account that needs to impersonate users for debugging purposes. Create a ClusterRole
    with impersonation permissions and show how to audit impersonation events. Include time-limited impersonation sessions
    for production debugging.
- id: k8s_0006_exp_028
  instruction: Implement RBAC for Vertical Pod Autoscaler (VPA) recommendations. Configure the vpa-recommender service account
    with permissions to read pod resource usage, read and update VPA objects, and recommend resource changes. Include admission
    plugin integration.
- id: k8s_0006_exp_029
  instruction: Configure RBAC for a backup and disaster recovery system (Velero). Create service account with permissions
    to snapshot volumes, read and restore all Kubernetes resources, and access object storage. Include encryption key management
    and namespace filtering for selective backups.
- id: k8s_0007_exp_000
  instruction: Create a Kubernetes CronJob for a SaaS application that purges expired user sessions from the database every
    15 minutes. Include the Job manifest, a C# console application that uses FluentMigrator to record session cleanup metrics
    in a dedicated audit table, and configure restart policy to OnFailure with a maximum of 3 retry attempts.
- id: k8s_0007_exp_001
  instruction: Design a Kubernetes Job that runs before each deployment to execute FluentMigrator migrations on a healthcare
    application's PostgreSQL database. The Job should use a Kubernetes Secret for database credentials, wait for the migration
    to complete successfully, and fail the deployment if migrations fail. Include the manifest, a .NET worker service, and
    a ConfigMap for migration version configuration.
- id: k8s_0007_exp_002
  instruction: 'Implement a Kubernetes CronJob for an e-commerce platform that generates nightly sales reports at midnight.
    The job should: execute a C# application that queries the database, create PDF reports using QuestPDF, email them via
    SendGrid, and store results in an S3-compatible bucket. Configure resource limits of 512Mi memory and 1 CPU core.'
- id: k8s_0007_exp_003
  instruction: 'Create Kubernetes Jobs and CronJobs for a multi-tenant fintech application: (1) A nightly job that reconciles
    transactions across isolated tenant databases, (2) A CronJob that runs FluentMigrator migrations sequentially for all
    tenants, (3) A job that generates compliance reports. Implement proper pod anti-affinity to prevent co-location and set
    concurrency policy to Forbid.'
- id: k8s_0007_exp_004
  instruction: Write a Kubernetes CronJob manifest and C# console application for an IoT platform that aggregates sensor readings
    into hourly summaries at 5 minutes past each hour. The application should use FluentMigrator to ensure the aggregation
    tables exist, process data in batches of 1000 records, and log completion metrics to Application Insights.
- id: k8s_0007_exp_005
  instruction: 'Design a Kubernetes Job that performs database schema migrations using FluentMigrator with zero-downtime constraints.
    The job should: execute in a dedicated namespace, use blue-green deployment strategy with a migration lock table, timeout
    after 30 minutes, and clean up temporary resources regardless of success or failure using an init container and finalizer
    pattern.'
- id: k8s_0007_exp_006
  instruction: 'Create a Kubernetes CronJob for a social media platform that runs content moderation batch jobs every hour.
    The job should: invoke a C# service that uses FluentMigrator to update content flags in the database, process content
    in priority order, and scale horizontally using a Job with parallel processing. Configure backoffLimit to 2 and activeDeadlineSeconds
    to 3600.'
- id: k8s_0007_exp_007
  instruction: Implement a Kubernetes CronJob that generates and emails weekly user engagement reports for a learning management
    system. Include the C# application code using FluentMigrator to ensure report tables exist, configure successful and failed
    job history limits to 3 and 1 respectively, and add annotations for Prometheus scraping.
- id: k8s_0007_exp_008
  instruction: 'Design a Kubernetes Job for a gaming platform that resets daily leaderboards at UTC midnight. The job should:
    truncate existing leaderboard tables (handled by FluentMigrator), recalculate scores from raw game events, archive previous
    day''s data, and notify connected clients via SignalR. Implement graceful shutdown handling for in-flight calculations.'
- id: k8s_0007_exp_009
  instruction: Create a Kubernetes CronJob for an email marketing platform that cleans up bounced email addresses and unsubscribed
    users daily at 1 AM. Include the FluentMigrator migration to add necessary indexes for performance, the C# worker with
    retry logic using Polly, and configure the job with a startingDeadlineSeconds of 300 for reliability.
- id: k8s_0007_exp_010
  instruction: 'Write Kubernetes manifests and C# code for an ML platform that retrains prediction models nightly. The job
    should: run FluentMigrator migrations to track experiment metadata, execute ML.NET training pipelines, validate model
    accuracy against thresholds, and promote models that pass. Include environment-specific ConfigMaps for dev/staging/prod.'
- id: k8s_0007_exp_011
  instruction: 'Create a Kubernetes CronJob for a legal document management system that archives documents older than 7 years
    to cold storage. The job should: use FluentMigrator to track archive records, process documents in chunks of 500, update
    document status atomically, and send compliance reports to the legal team. Implement job completion monitoring via webhook
    to Slack.'
- id: k8s_0007_exp_012
  instruction: Design a Kubernetes Job that runs FluentMigrator migrations during GitHub Actions deployment, with the ability
    to rollback if the deployment fails health checks. Include the C# migration runner, kubectl commands to monitor job status,
    timeout handling, and cleanup of migration locks on failure. The job should wait for at least 2 successful completions
    before proceeding.
- id: k8s_0007_exp_013
  instruction: 'Implement a Kubernetes CronJob for a real estate platform that syncs property listings from external MLS APIs
    every 30 minutes. The job should: use FluentMigrator to manage the sync status table, handle partial failures gracefully,
    log sync statistics, and configure concurrency policy Replace to handle overlapping runs. Include a readiness probe simulation
    in the C# code.'
- id: k8s_0007_exp_014
  instruction: 'Create a Kubernetes Job for a logistics application that processes incoming webhook events in batches. The
    job should: use FluentMigrator to create event tables and indexes, process events in order, maintain idempotency using
    a processed_events table, and support manual triggering via kubectl. Configure TTL seconds after finished to 3600 for
    cleanup.'
- id: k8s_0007_exp_015
  instruction: 'Write Kubernetes manifests for a subscription billing system with three scheduled jobs: (1) Monthly invoice
    generation on the 1st, (2) Payment retry processing on the 5th, 10th, and 15th, (3) FluentMigrator schema migrations quarterly.
    Include proper resource quotas, priority classes for critical billing jobs, and dead-letter queue handling for failed
    payments.'
- id: k8s_0007_exp_016
  instruction: 'Design a Kubernetes CronJob that rebuilds search indexes for an e-commerce catalog every Sunday at 3 AM. The
    job should: use FluentMigrator to version control index schema, rebuild indexes with zero downtime, verify index health
    post-build, and configure suspend annotation for maintenance windows. Include the C# index builder implementation.'
- id: k8s_0007_exp_017
  instruction: Create a Kubernetes CronJob for a customer support platform that generates and sends weekly ticket summary
    reports to team leads. Include FluentMigrator migrations for report metadata, the C# application with structured logging
    using Serilog, email distribution via SMTP, and integration with Datadog for job monitoring. Configure the job with specific
    node affinity for memory-optimized nodes.
- id: k8s_0007_exp_018
  instruction: 'Implement a Kubernetes Job that performs database disaster recovery validation weekly. The job should: run
    FluentMigrator migrations in dry-run mode, compare schema against expected state, validate data integrity checksums, and
    generate a compliance report. Include the Job manifest with strict security context settings and no privileged access.'
- id: k8s_0007_exp_019
  instruction: 'Write Kubernetes manifests and C# code for a news aggregation platform that fetches and processes RSS feeds
    every 15 minutes. The job should: use FluentMigrator to track feed sources and article metadata, implement rate limiting
    per feed source, deduplicate articles, and update relevance scores. Configure restart policy to Never and add labels for
    cost attribution.'
- id: k8s_0007_exp_020
  instruction: Design a Kubernetes CronJob for a video streaming platform that cleans up expired streaming sessions and regenerates
    CDN tokens daily. Include the FluentMigrator migration to add session expiration tracking columns, the C# worker with
    graceful shutdown, resource limits appropriate for high-throughput processing, and metrics export for Grafana dashboards.
- id: k8s_0007_exp_021
  instruction: 'Create a Kubernetes Job that provisions new tenant databases for a multi-tenant SaaS platform. The job should:
    use FluentMigrator to apply initial schema migrations, seed reference data, configure database-specific settings, and
    register the tenant in a central registry. Implement the job as a one-time operation triggered by a CustomResourceDefinition
    event.'
- id: k8s_0007_exp_022
  instruction: 'Implement a Kubernetes CronJob for a stock trading platform that calculates end-of-day portfolio valuations
    at market close (4 PM EST). The job should: use FluentMigrator to version control calculation results, handle timezone
    conversions correctly, maintain audit trail for regulatory compliance, and send results to a message queue for downstream
    processing.'
- id: k8s_0007_exp_023
  instruction: 'Write Kubernetes manifests for a DevOps platform that runs security vulnerability scans on container images
    weekly. The job should: use FluentMigrator to store scan results, generate SBOMs, compare against previous scans, create
    GitHub issues for critical vulnerabilities, and configure the job with security hardening including read-only root filesystem
    and non-root user.'
- id: k8s_0007_exp_024
  instruction: Create a Kubernetes CronJob for an event ticketing system that releases held tickets back to inventory every
    10 minutes. Include FluentMigrator migrations for ticket status tracking, the C# processor with optimistic concurrency
    control to prevent double-releases, and configure the job with a successfulJobsHistoryLimit of 5 to maintain visibility
    into recent runs.
- id: k8s_0007_exp_025
  instruction: 'Design a Kubernetes Job for a data warehouse that refreshes materialized views on demand. The job should:
    use FluentMigrator to track view versions, execute complex SQL transformations, handle dependent view refresh order automatically,
    and validate row counts post-refresh. Include retry logic with exponential backoff for transient database errors.'
- id: k8s_0007_exp_026
  instruction: 'Implement a Kubernetes CronJob for a sports betting platform that settles daily bets at midnight. The job
    should: use FluentMigrator to version the settlement schema, process bets in topological order based on dependencies,
    calculate winnings atomically, and update user balances with full ACID compliance. Include circuit breaker pattern for
    external odds API calls.'
- id: k8s_0007_exp_027
  instruction: 'Write Kubernetes manifests and C# code for an IoT fleet management system that processes device telemetry
    and updates device status hourly. The job should: use FluentMigrator to manage device registry schema, detect offline
    devices, trigger alerts for anomalous behavior, and configure the CronJob with timezone support for different device regions.'
- id: k8s_0007_exp_028
  instruction: Create a Kubernetes CronJob for a subscription video platform that generates personalized watch history summaries
    monthly. Include FluentMigrator migrations for summary storage, the C# application that aggregates viewing patterns, generates
    recommendations, and stores results. Configure the job with specific node selectors for compute-optimized instances and
    add pod disruption budget to ensure availability.
- id: k8s_0008_exp_000
  instruction: 'Create a Kustomize configuration for a Node.js REST API microservice with three overlays:

    1. Development: image pull policy Always, verbose logging, 256Mi memory limit

    2. Testing: 1 replica, mock external dependencies via environment variables

    3. Production: 3 replicas with resource requests (512Mi memory, 500m CPU), PodDisruptionBudget


    Include the base deployment, service, configmap, and secret kustomization files.

    Show how patches allow the same image to behave differently per environment.'
- id: k8s_0008_exp_001
  instruction: Migrate an existing Helm chart for a three-tier web application (React frontend, Express backend, MySQL) to
    a pure Kustomize structure. The Helm chart uses values.yaml extensively with environment-specific overrides. Create equivalent
    base manifests and overlays that achieve the same environment differentiation. Document the trade-offs encountered during
    migration.
- id: k8s_0008_exp_002
  instruction: 'Design a Kustomize setup for a multi-tenant SaaS platform where each tenant gets isolated Kubernetes namespaces
    with their own:

    - Tenant-specific configmaps containing branding/feature flags

    - Resource quotas scaled by subscription tier (free/pro/enterprise)

    - Ingress rules with tenant-specific subdomains


    Show how a single kustomization.yaml can generate all tenant namespaces using a generator pattern.'
- id: k8s_0008_exp_003
  instruction: 'Implement a GitOps workflow using Kustomize with ArgoCD for a CI/CD pipeline. The application has:

    - App of Apps pattern for managing multiple microservices

    - Sync waves for proper deployment ordering

    - Health checks and rollout detection

    - Automated image updates via ArgoCD Image Updater


    Include application CRDs and sync policy configurations.'
- id: k8s_0008_exp_004
  instruction: 'Create Kustomize overlays for a machine learning inference service that includes:

    - Base: TensorFlow Serving model with volume mount for model artifacts

    - Dev overlay: Load latest model from S3, enable debug endpoints

    - Staging overlay: Pre-warm with production model, shadow traffic testing

    - Production overlay: A/B testing between two model versions, 5 replicas with GPU node selectors


    Demonstrate strategic merge patches for updating inference parameters.'
- id: k8s_0008_exp_005
  instruction: 'Debug a production issue where pods are crashing with OOMKilled status. Create a diagnostic Kustomize overlay
    that:

    - Increases memory limits temporarily

    - Adds a debug sidecar container with troubleshooting tools

    - Enables verbose logging with structured JSON output

    - Exposes Prometheus metrics for memory profiling


    Show how this diagnostic overlay can be applied without modifying base manifests.'
- id: k8s_0008_exp_006
  instruction: 'Implement a Kustomize-based deployment for a stateful PostgreSQL database application with:

    - Base: StatefulSet with persistent volume claims, init container for migrations

    - Dev overlay: HostPath volume, insecure authentication

    - Staging overlay: PVC with 50Gi storage, daily automated backups to S3

    - Production overlay: Regional block storage, point-in-time recovery enabled, connection pooling via PgBouncer


    Include VolumeSnapshotClass and backup CronJob resources.'
- id: k8s_0008_exp_007
  instruction: 'Design a Kustomize configuration for zero-downtime deployments handling:

    - Rolling updates with PodDisruptionBudgets ensuring 67% availability

    - Pre/post-sync hooks for database migrations

    - Readiness gate checks before traffic shifting

    - Rollback strategy with previous ConfigMap versions


    Show the complete lifecycle management including both deploy and rollback scenarios.'
- id: k8s_0008_exp_008
  instruction: 'Create a Kustomize structure for a Kubernetes batch processing system:

    - Base: CronJob for daily report generation

    - Dev overlay: Every 5 minutes, verbose output, dry-run mode

    - Production overlay: At midnight UTC, resource-intensive (4CPU/8Gi), failure retries

    - One-time job overlay: Manual trigger for ad-hoc processing with custom parameters


    Demonstrate how to use patchesStrategicMerge vs patchesJSON6902 for different update scenarios.'
- id: k8s_0008_exp_009
  instruction: 'Implement multi-cluster Kubernetes deployment using Kustomize:

    - Shared base manifests across clusters

    - Cluster-specific overlays for AWS EKS, GCP GKE, and Azure AKS

    - Cloud-specific storage classes and load balancer annotations

    - Network policies varying by cloud provider''s CNI plugin


    Show how kustomize build can target specific clusters with --load-restrictor flag considerations.'
- id: k8s_0008_exp_010
  instruction: 'Create a Kustomize configuration for a serverless-style workload using Knative Serving:

    - Base: Knative Service definition with autoscaling configuration

    - Dev overlay: Always-revision deployment, minScale=0, maxScale=1

    - Production overlay: Per-scale with minScale=3, maxScale=100, concurrency limits


    Include domain mapping and certificate resources for HTTPS.'
- id: k8s_0008_exp_011
  instruction: 'Design Kustomize overlays for a payment processing microservice with PCI-DSS compliance:

    - Base: Standard security contexts, non-root containers

    - Dev overlay: Test card numbers allowed, verbose transaction logging

    - Production overlay: Network policies restricting egress, secret encryption at rest, audit logging to SIEM


    Show how sensitive data patches are managed separately from base configuration.'
- id: k8s_0008_exp_012
  instruction: 'Implement Kustomize with sealed secrets for secure configuration management:

    - Base manifests reference sealed secret resources

    - Developer overlay: Uses sealed secrets encrypted with developer public key

    - CI/CD overlay: Uses sealed secrets with pipeline public key

    - Production overlay: Sealed secrets with strict namespace binding


    Demonstrate the sealed-secrets controller integration and key rotation strategy.'
- id: k8s_0008_exp_013
  instruction: 'Create a Kustomize setup for managing 15 microservices in a monorepo:

    - Common base with shared labels, annotations, and security contexts

    - Component-level bases for frontend, backend, and data layers

    - Environment overlays applied uniformly across all services

    - Service-specific overrides for resource-heavy or light services


    Show how to use components feature for reusable building blocks.'
- id: k8s_0008_exp_014
  instruction: 'Implement canary deployments using Kustomize for gradual traffic shifting:

    - Base: Stable deployment with 100% traffic

    - Canary overlay: Deploy 10% canary version with different service port

    - Progressive overlay: Incrementally shift traffic via weight-based routing

    - Full rollout overlay: Complete migration with cleanup of old version


    Include Istio VirtualService or Gateway API resources for traffic management.'
- id: k8s_0008_exp_015
  instruction: 'Design a Kustomize configuration for a multi-region deployment:

    - Base manifests for stateless API service

    - Region overlays (us-east-1, eu-west-1, ap-southeast-1) with regional configs

    - GeoDNS configuration per region

    - Cross-region replication for Redis cache


    Show patches for regional environment variables and endpoint configurations.'
- id: k8s_0008_exp_016
  instruction: 'Create a Kustomize-based disaster recovery solution:

    - Base: Primary site deployment

    - DR overlay: Standby site with scaled-down resources, cross-region replication

    - RTO test overlay: Full-scale DR drill configuration

    - Failover overlay: Emergency production configuration with DNS updates


    Include namespace and context switching documentation.'
- id: k8s_0008_exp_017
  instruction: 'Implement Kustomize overlays for a Kubernetes-based CI runner system:

    - Base: GitLab Runner with persistent volume for cache

    - Dev overlay: Ephemeral runners, shared runners enabled

    - Production overlay: Dedicated runners, job concurrency limits, resource quotas

    - Spot/preemptible overlay: Cost-optimized runners with graceful termination handlers


    Show how to handle runner registration tokens securely.'
- id: k8s_0008_exp_018
  instruction: 'Create a Kustomize configuration for an observability stack:

    - Base: Prometheus, Grafana, Alertmanager with persistent storage

    - Dev overlay: Minimal resources, externalize storage to hostPath

    - Production overlay: High availability mode, long-term storage integration, slack notifications

    - Federeated overlay: Central Prometheus aggregating from remote clusters


    Include ServiceMonitor and PrometheusRule resources.'
- id: k8s_0008_exp_019
  instruction: 'Design Kustomize overlays for a WordPress CMS deployment:

    - Base: Deployment with init container for wp-config.php generation

    - Dev overlay: Debug mode, code mounting from ConfigMap

    - Staging overlay: Staging domain SSL, administrator access for QA

    - Production overlay: Multi-AZ with EFS for shared storage, WAF integration


    Handle persistent storage differences across environments.'
- id: k8s_0008_exp_020
  instruction: 'Implement Kustomize with OPA/Gatekeeper policy enforcement:

    - Base: Application manifests that must pass security policies

    - Constraint templates and constraints as Kustomize components

    - Overlay to enable/disable policy enforcement by environment

    - Audit overlay for reporting violations without blocking deployment


    Show integration with admission controller webhooks.'
- id: k8s_0008_exp_021
  instruction: 'Create a Kustomize configuration for a GraphQL API gateway:

    - Base: Apollo Gateway with schema from ConfigMap

    - Dev overlay: Introspection enabled, playground enabled, verbose logging

    - Production overlay: Managed federation, schema locking, query cost analysis


    Demonstrate how to patch datasource configurations per environment.'
- id: k8s_0008_exp_022
  instruction: 'Design Kustomize overlays for a real-time chat application using WebSocket:

    - Base: Stateful service for WebSocket connections

    - Dev overlay: In-memory pub/sub, single instance

    - Production overlay: Redis pub/sub cluster, horizontal pod autoscaling based on connection count

    - Multi-region overlay: Regional WebSocket endpoints with global load balancing


    Include HPA configurations based on custom metrics.'
- id: k8s_0008_exp_023
  instruction: 'Implement Kustomize for a legacy monolith modernization strategy:

    - Base: Large deployment of monolithic application

    - Feature flags overlay: Enable/disable features via environment variables

    - Extract overlay: Identify candidate microservices extracted from monolith

    - Shadow mode overlay: New service receives mirrored traffic for validation


    Show gradual migration patterns using overlays.'
- id: k8s_0008_exp_024
  instruction: 'Create Kustomize overlays for a video transcoding service:

    - Base: FFmpeg-based transcoding job

    - Dev overlay: Small test files, verbose output

    - Staging overlay: Production-like workload with CDN simulation

    - Production overlay: GPU-enabled workers, spot instances, output to S3


    Include PersistentVolumeClaim for scratch space.'
- id: k8s_0008_exp_025
  instruction: 'Design Kustomize for managing multiple ingress versions during migration:

    - Base: Deprecated nginx-ingress controller

    - Migration overlay: Both controllers running, split traffic

    - Target overlay: kubernetes-ingress with new configurations

    - Cleanup overlay: Remove legacy controller after full migration


    Handle certificate and DNS considerations during transition.'
- id: k8s_0008_exp_026
  instruction: 'Implement Kustomize with external secrets using HashiCorp Vault:

    - Base: Application referencing external secrets via annotations

    - Vault configuration as Kustomize components

    - Dev overlay: Dev Vault instance with test secrets

    - Production overlay: Production Vault with dynamic secret generation


    Show external-secrets operator integration.'
- id: k8s_0008_exp_027
  instruction: 'Create a Kustomize configuration for a scheduled data pipeline:

    - Base: Apache Airflow deployment on Kubernetes

    - Dev overlay: Sequential executor, in-memory metadata DB

    - Production overlay: Celery executor with PostgreSQL metastore, high availability

    - Dag sync overlay: Git-sync sidecar keeping DAGs updated


    Include persistent volumes for logs and DAG storage.'
- id: k8s_0008_exp_028
  instruction: 'Design Kustomize overlays for a customer support ticketing system:

    - Base: Application with PostgreSQL and Redis

    - Dev overlay: Seeded test data, debug endpoints

    - Multi-tenant overlay: Shared infrastructure with data isolation

    - Compliance overlay: GDPR data masking, audit trails, data retention policies


    Handle email/SMTP configuration differences per environment.'
