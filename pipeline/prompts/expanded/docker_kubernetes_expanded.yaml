- id: k8s_0004_exp_000
  instruction: "- |\n  Debug a Redis pod in a Kubernetes cluster that is crash-looping after deployment.\n  The pod logs show:\
    \ \"JedisConnectionException: Could not get a resource from the pool\"\n  The application expects Redis to be available\
    \ at a service named \"redis-cache\".\n  Walk through kubectl get pods, kubectl describe pod, kubectl logs, verify the\
    \ Redis\n  service exists and has the correct selector labels matching the deployment.\n\n- |\n  A MongoDB StatefulSet\
    \ pod is failing to start with the error:\n  \"com.mongodb.MongoSocketOpenException: Exception opening socket\"\n  The\
    \ database is configured via a ConfigMap with MONGODB_URI environment variable.\n  Diagnose whether the StatefulSet's\
    \ headless service DNS resolution is working,\n  check the replica count, and verify the DNS entries via kubectl run debugging\
    \ pod.\n\n- |\n  Investigate a MySQL pod crash with exit code 137 (SIGKILL).\n  The application logs show connection timeouts\
    \ to the database.\n  Use kubectl top pod to check resource usage, kubectl describe pod for events,\n  and verify the\
    \ container memory limits are appropriate for MySQL's expected\n  memory footprint (typically 1-2GB for standard MySQL).\n\
    \n- |\n  An Elasticsearch pod is stuck in CrashLoopBackOff with \"max virtual memory areas\n  vm.max_map_count [65530]\
    \ is too low\" in the kernel audit logs.\n  This is a common sysctl issue in Kubernetes. Explain how to fix this using\n\
    \  an Init Container with securityContext sysctls, or by configuring the kubelet\n  with proper sysctl settings.\n\n-\
    \ |\n  A RabbitMQ pod reports \"Channel closed: 503 (SERVACT) message: 'NO_ROUTE'\" after\n  a deployment. The deployment\
    \ references a ConfigMap for RABBITMQ_DEFAULT_VHOST.\n  Diagnose the issue by checking if the vhost was created before\
    \ the queue\n  declaration, using kubectl exec to verify the vhost exists, and fixing the\n  initialization order using\
    \ an Init Container.\n\n- |\n  Debug a Java Spring Boot application pod that cannot connect to PostgreSQL with\n  \"Connection\
    \ refused\" errors. The connection string is injected via a Secret\n  (base64-encoded). Use kubectl get secret to view\
    \ the decoded values, verify the\n  database service endpoint with kubectl get endpoints, and explain the difference\n\
    \  between using secrets as environment variables vs volume mounts for sensitive data.\n\n- |\n  A Python FastAPI application\
    \ pod is crash-looping with \"aiodns DNS lookup failed\"\n  errors when trying to reach an external API. This suggests\
    \ DNS resolution issues.\n  Create a debugging pod with nslookup and curl utilities to test external DNS\n  resolution,\
    \ and check if the cluster's DNS (CoreDNS) is functioning properly\n  with kubectl logs -n kube-system deployment/coredns.\n\
    \n- |\n  Debug a Node.js application pod that crashes on startup with \"ECONNREFUSED 127.0.0.1:6379\".\n  The Redis connection\
    \ is configured with REDIS_HOST=localhost in the ConfigMap.\n  Explain why localhost doesn't work in Kubernetes (each\
    \ pod is its own network namespace),\n  demonstrate fixing it with the correct Kubernetes service DNS name format\n  (service.namespace.svc.cluster.local).\n\
    \n- |\n  A Kubernetes Deployment for a .NET Core application cannot connect to SQL Server\n  with error: \"A network-related\
    \ or instance-specific error occurred while establishing\n  a a connection to SQL Server\". The connection string uses\
    \ a Kubernetes Service name.\n  Use kubectl exec to test connectivity from within the pod, check if the SQL Server\n \
    \ pod is listening on the correct port (1433), and verify network policies.\n\n- |\n  Investigate a Go application pod\
    \ that fails with \"context deadline exceeded\" when\n  connecting to a gRPC backend service. The gRPC service uses a\
    \ ClusterIP service.\n  Debug using protoc client from within the pod, verify the service endpoints exist\n  with kubectl\
    \ get endpoints, and check if iptables rules are causing issues on\n  the node.\n\n- |\n  A Kubernetes Job is failing\
    \ with pod status \"ImagePullBackOff\" after a recent\n  deployment changed the container image tag from \"latest\" to\
    \ a specific version.\n  Diagnose the image pull failure by checking kubectl describe job, verify the image\n  name is\
    \ correct, check if the container registry credentials are properly configured\n  in the imagePullSecrets, and fix the\
    \ authentication issue.\n\n- |\n  Debug a multi-container Pod where the main application container fails because\n  it\
    \ depends on an init container that configures a database connection file.\n  The init container writes to a shared emptyDir\
    \ volume, but the main container\n  cannot read it. Use kubectl describe pod to check init container status,\n  kubectl\
    \ exec to inspect the volume mount, and fix the volume permissions issue.\n\n- |\n  A Kubernetes Deployment's pod is crash-looping\
    \ with OOMKilled status.\n  The application is a memory-intensive ML inference service.\n  Use kubectl describe pod to\
    \ check resource limits, kubectl top pods to monitor\n  actual usage, analyze heap dumps or memory profiles, and propose\
    \ appropriate\n  resource limits and requests based on observed patterns.\n\n- |\n  Debug a Horizontal Pod Autoscaler\
    \ that keeps scaling down a pod causing\n  disruptions. The application needs warm-up time after startup. Check kubectl\n\
    \  describe hpa, verify the readiness probe is configured correctly, and implement\n  a proper startup probe to handle\
    \ long initialization times before HPA takes over.\n\n- |\n  A Pod using a ConfigMap as environment variables shows stale\
    \ values after the\n  ConfigMap was updated. The application doesn't reflect the new configuration.\n  Explain that environment\
    \ variables from ConfigMaps are not automatically updated\n  when the ConfigMap changes (unlike volume mounts), demonstrate\
    \ debugging with\n  kubectl get configmap and kubectl describe deployment, and fix by using ConfigMap\n  volumes or restarting\
    \ the pods.\n\n- |\n  Investigate a Pod failing with \"挂载失败: permission denied\" (mount failed:\n  permission denied)\
    \ when mounting a PersistentVolumeClaim. The storage class\n  uses a specific security context. Check kubectl describe\
    \ pvc, verify the storage\n  class's fsGroup setting, and fix using securityContext fsGroup or adjusting\n  the Pod's\
    \ security context to match the volume's ownership requirements.\n\n- |\n  Debug a Kubernetes Deployment where pods fail\
    \ readiness probes with\n  \"tcp connect: connection refused\" even though the application is running.\n  The application\
    \ starts slowly but the readiness probe checks too aggressively.\n  Configure a startup probe to handle slow-starting\
    \ applications, tune the\n  readiness probe parameters, and verify the fix works under load conditions.\n\n- |\n  A Kubernetes\
    \ Deployment using an Ingress resource cannot route traffic to pods.\n  The Ingress shows backend errors. Use kubectl\
    \ describe ingress, check if the\n  service backend matches the deployment selector, verify the service port\n  configuration,\
    \ and test with a temporary port-forward to isolate whether\n  the issue is in the Ingress controller or the backend service.\n\
    \n- |\n  Debug a Cassandra StatefulSet where nodes cannot join the cluster.\n  Pod logs show \"Could not reach gossip\
    \ endpoint\". This is common in StatefulSets\n  with stateful networking. Verify the headless service creates correct\
    \ DNS entries,\n  check the POD_NAME and POD_IP environment variables are set, and verify that the\n  seed provider configuration\
    \ uses the correct Kubernetes DNS names.\n\n- |\n  A Kubernetes Pod using a Secret for TLS certificates fails to start\
    \ with\n  \"no such file or directory\" for the certificate files. The Secret is mounted\n  as a volume but has incorrect\
    \ keys. Diagnose with kubectl describe pod showing\n  volume mount issues, kubectl get secret to view secret contents,\
    \ and fix by\n  ensuring the Secret volume uses the correct item paths matching the application's\n  expected file names.\n\
    \n- |\n  Debug a Kubernetes Deployment where pods cannot resolve external DNS names\n  (like api.stripe.com) but internal\
    \ service names resolve fine. This indicates\n  a cluster-wide DNS configuration issue. Test with a debugging pod, check\
    \ CoreDNS\n  logs for upstream resolution failures, verify the ndots setting in the Pod's\n  resolv.conf, and explain\
    \ the trade-offs between ndots=5 (default) and higher values.\n\n- |\n  A Kubernetes Deployment for a PHP-FPM application\
    \ cannot connect to a Unix\n  socket for the database connection. The socket is defined in a ConfigMap as\n  SOCKET_PATH=/var/run/mysql/mysql.sock.\
    \ Explain that Unix sockets don't work\n  across network namespaces in Kubernetes, fix by switching to TCP connections\n\
    \  over the Kubernetes service network, and update the application's database\n  connection configuration.\n\n- |\n  Debug\
    \ a Kafka pod crash with \"Failed to create Kafka log directory\" error.\n  The pod uses a PersistentVolumeClaim for data\
    \ storage. Check the PVC status\n  with kubectl get pvc, verify the storage class supports the access mode,\n  and diagnose\
    \ whether the underlying storage provisioner has issues in the\n  specific namespace or availability zone.\n\n- |\n  A\
    \ Kubernetes Deployment is experiencing intermittent connection resets between\n  pods in the same ReplicaSet. The application\
    \ uses long-lived HTTP connections.\n  Enable proxy metrics, check for pod restart events with kubectl get events,\n \
    \ verify the kube-proxy is working correctly, and consider if this is an iptables\n  connection tracking issue during\
    \ rolling updates.\n\n- |\n  Debug a Kubernetes Pod that fails with \"Unable to attach or mount volumes:\n  unattached\
    \ volumes\" during scheduling. The Deployment references a ConfigMap\n  that doesn't exist. This causes the pod to remain\
    \ in Pending state.\n  Use kubectl describe pod to find the error, verify all referenced ConfigMaps\n  and Secrets exist\
    \ with kubectl get configmaps, and fix by creating missing\n  resources or correcting the references.\n\n- |\n  Investigate\
    \ a cross-namespace service access failure where Pods in namespace\n  \"frontend\" cannot reach services in namespace\
    \ \"backend\". The error is\n  \"no endpoints available\". Verify the service exists in the correct namespace,\n  check\
    \ that pods in the backend namespace have labels matching the service selector,\n  and explain how to properly reference\
    \ cross-namespace services using the fully\n  qualified domain name (service.backend.svc.cluster.local).\n\n- |\n  A Kubernetes\
    \ Pod is crash-looping with \"exec format error\" indicating the\n  container image architecture doesn't match the node\
    \ architecture.\n  The Deployment uses an ARM-based image but the cluster nodes are AMD64.\n  Diagnose using kubectl describe\
    \ pod architecture information, check node labels\n  with kubectl get nodes --show-labels, and fix using node selectors\
    \ or multi-arch\n  image manifests with appropriate image tags per architecture.\n\n- |\n  Debug a Kubernetes Deployment\
    \ where the application crashes with\n  \"too many open files\" after handling high traffic. This is a common ulimit issue.\n\
    \  Check the container's file descriptor limits with kubectl exec -- ulimit -n,\n  verify the securityContext's limits\
    \ are appropriate, and fix by setting proper\n ulimit values in the container security context or requesting higher limits\n\
    \  in the PodSecurityContext.\n\n- |\n  A Kubernetes StatefulSet pod fails to become ready after a cluster upgrade.\n\
    \  The application binds to a specific IP address from an environment variable\n  that's no longer valid after the upgrade.\
    \ Diagnose by checking if the service\n  ClusterIP has changed, verify the environment variables match the current\n \
    \ service configuration, and fix by ensuring the application uses DNS names\n  instead of hardcoded IP addresses."
